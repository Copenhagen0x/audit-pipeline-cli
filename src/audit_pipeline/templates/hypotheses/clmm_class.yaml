    applies_to: [orca-whirlpools, kamino-liquidity]
    scope_conditions: []
    bug_class: zero-liquidity-state-leak

  - id: CLMM103-tick-liquidity-net-monotone-with-position
    class: invariant_property
    severity: High
    claim: >
      Adding a position with liquidity L increases tick.liquidity_net by
