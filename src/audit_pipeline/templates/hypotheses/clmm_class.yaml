  # ─────────────────────────── 9. EDGE CASES ─────────────────────────────────

  - id: CLMM190-full-range-position
    class: invariant_property
    severity: Medium
    claim: >
      A full-range position (MIN_TICK to MAX_TICK) accumulates fees
      proportionally to total liquidity in range — no degenerate path.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: full-range-edge-case

  - id: CLMM191-single-tick-position-rejected
    class: authorization
    severity: Medium
    claim: >
      A position with lower_tick == upper_tick is rejected; degenerate
      single-tick positions are not allowed.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: single-tick-position

  - id: CLMM192-extreme-price-not-corruptive
    class: arithmetic_overflow
    severity: High
    claim: >
      Extreme sqrt-prices near MIN/MAX do not corrupt swap math via
      under/overflow; the curve handles boundaries cleanly.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: extreme-price-edge-overflow
