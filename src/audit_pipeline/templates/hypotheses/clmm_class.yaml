    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: tick-liquidity-gross-drift

  - id: CLMM105-position-liquidity-non-negative
    class: invariant_property
    severity: High
    claim: >
      Position.liquidity is always non-negative; no remove-too-much path
      lets it underflow.
    applies_to: [orca-whirlpools, kamino-liquidity]
    scope_conditions: []
    bug_class: position-liquidity-underflow

  - id: CLMM106-add-liquidity-zero-rejected
