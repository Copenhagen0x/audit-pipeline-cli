  # ─────────────────────────── 6. VAULTED-LP (KAMINO) ─────────────────────────

  - id: CLMM120-vaulted-rebalance-state-atomic
    class: state_transition
    severity: High
    claim: >
      Vaulted CLMM strategies atomically: collect fees, remove old-range
      liquidity, swap to target ratio, deposit new-range liquidity.
      Partial-state mid-rebalance does not let the vault be deposited
      to or withdrawn from.
    applies_to: [kamino-liquidity, meteora-dlmm]
    scope_conditions: []
    bug_class: rebalance-non-atomic

  - id: CLMM121-vault-share-mint-burn
    class: invariant_property
    severity: Critical
    claim: >
      Vaulted-LP share mint/burn preserves shares-per-vault-NAV
      monotonicity. No deposit-then-rebalance sequence lets a depositor
      mint at a stale NAV and withdraw at a fresh one.
    applies_to: [kamino-liquidity, meteora-dlmm]
    scope_conditions: []
    bug_class: vault-share-inflation

  - id: CLMM122-vault-fee-collection-pre-deposit
    class: state_transition
    severity: High
    claim: >
      Vaulted strategy collects all pending fees BEFORE accepting a
      deposit, so the depositor's mint reflects post-fee NAV.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-deposit-before-fee-collect

  - id: CLMM123-vault-fee-collection-pre-withdraw
    class: state_transition
    severity: High
    claim: >
      Vaulted strategy collects pending fees BEFORE processing a
      withdrawal, so the withdrawer's burn reflects post-fee NAV.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-withdraw-before-fee-collect

  - id: CLMM124-vault-cpi-account-validation
    class: authorization
    severity: High
    claim: >
      Vaulted-LP layers that CPI into the underlying CLMM validate every
      account passed through the CPI matches the vault's bound state.
    applies_to: [kamino-liquidity]
    scope_conditions: [cross_program_invocation_heavy]
    bug_class: cpi-account-substitution

  - id: CLMM125-vault-share-rounding-favors-vault
    class: arithmetic_overflow
    severity: High
    claim: >
      Vault share-mint rounds DOWN (favoring vault); share-burn rounds
      DOWN (favoring vault). No round-trip can extract value.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-rounding-direction

  - id: CLMM126-vault-rebalance-only-by-strategist
    class: authorization
    severity: High
    claim: >
      Vault rebalance is callable only by the configured strategy
      authority; no permissionless path triggers an unprofitable
      rebalance.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-rebalance-unauthorized

  - id: CLMM127-vault-position-singleton
    class: invariant_property
    severity: High
    claim: >
      A vault holds at most one underlying CLMM position at any time;
      no rebalance can leave two positions open and split.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-multi-position-orphan

  - id: CLMM128-vault-deposit-respects-strategy-range
    class: state_transition
    severity: Medium
    claim: >
      Deposits land in the vault's configured strategy range; no path
      lets a deposit deploy liquidity to a different range.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-deposit-range-mismatch

  - id: CLMM129-vault-withdraw-pro-rata-on-mixed-tokens
    class: invariant_property
    severity: High
    claim: >
      Withdrawal returns pro-rata token-A and token-B based on current
      vault holdings (including pending fees + rewards), not stale ratios.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-withdraw-stale-ratio

  - id: CLMM130-vault-emergency-pause-respected
    class: authorization
    severity: High
    claim: >
      Vault paused state blocks deposit + rebalance; withdraw remains
      available so users can exit.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-pause-blocks-withdraw

  - id: CLMM131-vault-share-decimals-preserved
    class: invariant_property
    severity: Medium
    claim: >
      Vault share token decimals are fixed at init; no path mutates
      decimals after deployment.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-share-decimals-mutation

  - id: CLMM132-vault-fee-share-bounded
    class: invariant_property
    severity: Medium
    claim: >
      Performance / management fee share is bounded by the configured
      max; no rebalance path takes more than the cap.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-fee-share-overcharge

  - id: CLMM133-vault-fee-share-recipient-bound
    class: authorization
    severity: Medium
    claim: >
      Vault fee-share withdrawal sends to the configured fee-recipient
      pubkey; no path redirects.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-fee-redirect

  - id: CLMM134-vault-flash-deposit-rejected
    class: authorization
    severity: High
    claim: >
      Vaults reject flash-loan-style deposit-and-withdraw within the same
      tx if the rebalance hasn't run; no MEV path captures NAV growth
      around a rebalance.
    applies_to: [kamino-liquidity]
    scope_conditions: []
    bug_class: vault-flash-mev

  # ─────────────────────────── 7. CPI / SECURITY ──────────────────────────────

  - id: CLMM150-flash-loan-no-position-takeover
    class: authorization
    severity: Critical
    claim: >
      Pool flash-loans cannot be used to modify a position the caller
      doesn't own — the inner callback runs with the caller's authority,
      not the pool's.
    applies_to: [orca-whirlpools, kamino-liquidity]
    scope_conditions: [flash_loan]
    bug_class: flash-loan-position-takeover

  - id: CLMM151-token-program-pinned
    class: authorization
    severity: High
    claim: >
      The token-program pubkey passed to CPI matches the canonical SPL
      Token / Token-2022 ID; substituted programs are rejected.
    applies_to: [orca-whirlpools, kamino-liquidity]
    scope_conditions: []
