    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: pda-rent-exemption

  # ─────────────────────────── 8. AUTHORIZATION ──────────────────────────────

  - id: CLMM170-admin-instructions-gated
    class: authorization
    severity: Critical
    claim: >
      Every admin-only instruction (init pool, set fee, pause, set
      reward emission rate) checks the signer against the configured
      admin pubkey.
    applies_to: [orca-whirlpools, kamino-liquidity]
    scope_conditions: []
    bug_class: admin-gate-bypass

  - id: CLMM171-fee-rate-update-bounded
    class: authorization
    severity: High
    claim: >
      Fee-rate updates are restricted to the configured fee-tier set;
      admin cannot set an arbitrary out-of-tier rate.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: fee-rate-out-of-tier-by-admin

  - id: CLMM172-pause-respected-by-mutating-paths
    class: authorization
    severity: High
    claim: >
      When the pool is paused, swap / open-position / modify-position
      / collect-fees all return early without state mutation.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: pause-bypass

  - id: CLMM173-multisig-threshold-respected
    class: authorization
    severity: High
    claim: >
