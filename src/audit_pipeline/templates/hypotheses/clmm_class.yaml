      reverses exactly. No path drifts the pair.
    applies_to: [orca-whirlpools]
    scope_conditions: []
    bug_class: tick-liquidity-net-drift

  - id: CLMM104-tick-liquidity-gross-monotone-with-position
    class: invariant_property
    severity: High
    claim: >
      Tick.liquidity_gross tracks the absolute sum of liquidity referencing
