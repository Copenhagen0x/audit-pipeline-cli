      read happened years ago could have a p_last orders of magnitude
      from current market reality. The Degenerate arm is intentional
      "dead oracle" recovery, but it admits admin to FORCE a stale
      settlement price by withholding oracle reads while liquidity
      drains naturally — then declaring Degenerate. Verify there is
      no admin path to pre-position p_last advantageously then declare
      Degenerate. Hard-timeout gate at 9265 only rejects Live calls;
