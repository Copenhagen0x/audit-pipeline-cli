  - id: U10-topupinsurance-dust-into-insurance-ceiling-bypass
    class: arithmetic_overflow
    severity: Medium
    bug_class: insurance-ceiling-uncapped-bypass
    claim: >
      TopUpInsurance at src/percolator.rs:8675-8748 has no upper bound
      on insurance_fund.balance — only the SPL transfer succeeds-or-not
      gates the size. A whale could push insurance arbitrarily high,
      which in turn raises the tvl_insurance_cap_mult cap and allows
      proportionally larger deposits across the market. If
      tvl_insurance_cap_mult was set large at init (say 100), pumping
      insurance by X opens (cap × X) of new TVL admission. Insurance
      cannot directly drain to capital, but the asymmetry creates a
      manipulation surface: a market with very high insurance and a
      tight cap_mult ratio may admit deposits that the market's risk
      machinery is not sized for (e.g., max_active_positions_per_side
      sized to a smaller TVL than the cap admits).
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      TopUpInsurance (8675-8748), DepositCollateral cap check
      (6661-6674), InitUser cap check (6418-6437)

  - id: U11-admin-force-close-clock-unused-but-still-required
    class: implicit_invariant
    severity: Low
    bug_class: unused-account-required-via-stale-signature
    claim: >
      AdminForceCloseAccount at src/percolator.rs:9784 reads
      Clock::from_account_info(&accounts[6])? but binds the value to
      `_clock` (unused). The clock is required at the account-list
      level (length-7 enforced at 9744), but never consulted. Admin
      can pass ANY account here (the helper only validates the sysvar
      pubkey matches solana_sdk::sysvar::clock::id()). This is benign
      today because the helper rejects mismatched pubkeys, BUT it
      means future changes that want to gate AdminForceCloseAccount
      on a slot-based timer must add the binding AND remove the
      `_clock` discard. Smell-test: unused sysvars in instruction
      bodies are red flags for incomplete gating.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      AdminForceCloseAccount (9740-9841), clock_unused_at (9784)

  # ===================================================================
  # FAMILY U-lifecycle — Per-account init -> trade -> close -> re-init
  # ===================================================================

  - id: U12-init-immediately-close-rent-extraction
    class: state_transition
    severity: Medium
    bug_class: init-close-rent-rebate-asymmetry
    claim: >
      InitUser at src/percolator.rs:6328-6463 splits fee_payment into
      new_account_fee (to insurance) and capital (to user). CloseAccount
      at 8481-8674 returns capital + claimable_pnl - fee_credits debt.
      The new_account_fee paid to insurance is NOT refunded on close.
      A user who init-then-immediately-closes loses new_account_fee but
      receives capital back. Compare against: a user who repeatedly
      init-trades-loses-closes-reinits — the fee accumulates in
      insurance, but the per-account-slot is freed and reused. An
      attacker pre-funding a market with insurance via spamming
      init-close cycles can effectively GIFT insurance from their
      deposits, raising the tvl_insurance_cap_mult ceiling (see U10).
      Cost: new_account_fee × N. Benefit: increased ceiling for other
      attackers / themselves to deposit larger positions. Net: zero-
      cost insurance pump if the same user is on both sides.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      InitUser (6328-6463), CloseAccount (8481-8674)

  - id: U13-account-generation-counter-wraparound-on-extreme-reuse
    class: arithmetic_overflow
    severity: Low
    bug_class: u64-counter-wraparound
    claim: >
      next_mat_counter at src/percolator.rs:2952-2980 returns
      Option<u64>; the implementation increments u64 with checked_add
      and returns None on overflow (which maps to EngineOverflow). The
      counter is per-slab and is consumed on EVERY InitUser/InitLP.
      A market that init-closes-reinits 2^64 times would brick the slab
      (no further inits possible). Worth ~1e10 USD in tx fees to reach
      at current rates — economically irrational, BUT a malicious
      admin who wants to brick their own market post-fundraise has a
      cheap path: open and close 2^64 accounts to make the slab
      unusable, then claim "withdrawals are blocked." Verify graceful
      degradation: does the EngineOverflow at next_mat_counter
      saturation also affect WithdrawCollateral, CloseAccount, etc.?
      Or does it only block new init? If only init is blocked, the
      attack is benign.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      next_mat_counter (2952), InitUser (6460-6462), InitLP

  - id: U14-prepare-lazy-free-head-rebuild-on-fresh-bitmap-injects-slot
    class: state_transition
    severity: High
    bug_class: account-gc-state-leak
    claim: >
      prepare_lazy_free_head at src/percolator.rs:4612-4646 has a
      fallback branch (4630-4642) that triggers when free_head's linked
      list invariants are violated: it rebuilds the list head at idx ==
      num_used_accounts. The rebuild zeros prev_free[idx] = u16::MAX
      and sets next_free[idx] = idx+1 (or MAX). If an attacker can
      cause the free-list to become INCONSISTENT (free_head points to
      a slot whose prev_free/next_free contradicts head invariants),
      the rebuild forces head = num_used_accounts — which may NOT be
      a free slot. The check `engine_is_used(engine, idx)` at line 4618
      returns Err on used slot, but the FALLBACK rebuild at 4630
      doesn't re-check is_used after rebuild. Verify the fallback only
      triggers when num_used_accounts is provably free.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      prepare_lazy_free_head (4612-4646), free_head invariants

  - id: U15-set-wrapper-owner-pre-existing-owner-zero-leak
    class: state_transition
    severity: High
    bug_class: account-ownership-takeover
    claim: >
      set_wrapper_owner at src/percolator.rs:5355-5366 rejects when
      engine.accounts[idx].owner != [0u8; 32]. The check assumes a
      reclaimed/freed slot has owner = [0u8; 32]. Verify across all
      call paths into reclaim/free that owner is provably zeroed
      BEFORE set_wrapper_owner is called on the same idx in a
      subsequent InitUser. Specifically: engine.close_account_not_atomic
      and reclaim_flat_zero_account_if_eligible must both zero the
      owner. If either path leaves owner non-zero, the next InitUser
      that hits this slot via prepare_lazy_free_head bails — but the
      slot is now WEDGED (no other instruction zeroes owner, so no
      future init can use the slot).
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      set_wrapper_owner (5355), reclaim_flat_zero_account_if_eligible
      (5177), engine.close_account_not_atomic, engine.reclaim_empty_account_not_atomic

  - id: U16-closeaccount-resolved-path-no-fee-debt-forgiveness
    class: state_transition
    severity: High
    bug_class: fee-debt-survives-close
    claim: >
      CloseAccount at src/percolator.rs:8481-8674 has TWO branches:
      resolved (8579-8592) calls force_close_resolved_with_fee_not_atomic
      which handles fees internally; live (8593-8627) calls
      close_account_not_atomic after settle_account_then_sync_fee_current.
      The resolved branch documents "do not pre-sync here or fees become
      senior to same-account terminal losses" (8576-8578). Verify the
      resolved engine call ACTUALLY zeros fee_credits — if it returns
      ResolvedCloseResult::Closed but leaves fee_credits != 0, the slot
      is freed (next_mat_counter advances) but the next InitUser on
      this slot inherits fee_credits from a freshly-zeroed slot only
      if zeroing happens IN the close path. Trace the engine call:
      does force_close_resolved_with_fee_not_atomic + reclaim_empty_account_not_atomic
      compose to zero ALL fields including fee_credits?
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      CloseAccount (8481-8674), force_close_resolved_with_fee_not_atomic,
      reclaim_empty_account_not_atomic

  - id: U17-init-after-close-stale-account-generation
    class: state_transition
    severity: Medium
    bug_class: account-generation-replay
    claim: >
      InitUser writes account-generation via next_mat_counter at
      src/percolator.rs:6460-6462. Generation is per-slab, monotone.
      But a SLOT's generation table entry is updated to the new gen
      ONLY when InitUser/InitLP runs on that slot. A slot freed via
      CloseAccount has its generation entry preserved (read_account_generation
      at 3071 reads from a fixed offset table, not slot data). On
      re-init the slot inherits the OLD gen until 6462 fires. The
      generation table acts as a per-instance identifier across slot
      reuse — but there's a gap: between close and next-init, the
      generation table entry is stale. Any reads against the stale gen
      (e.g., off-chain client cached state, on-chain TradeCpi matchers
      using gen to disambiguate) could conflate the post-close slot
      with the pre-close instance.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      next_mat_counter (2952), write_account_generation (3077),
      InitUser (6460), CloseAccount (no gen-table touch)

  - id: U18-flat-account-reclaim-zeros-but-clock-not-touched
    class: state_transition
    severity: Medium
    bug_class: stale-clock-cursor-on-reclaim
    claim: >
      reclaim_flat_zero_account_if_eligible at src/percolator.rs:5177-5203
      calls engine.reclaim_empty_account_not_atomic if all fields are
      zero. The check at 5187-5193 inspects capital, basis, pnl, reserved_pnl,
      sched/pending_present, fee_credits. Notably absent:
      account.last_fee_slot, account.adl_epoch_snap. After reclaim, if
      these cursors are NOT zeroed, the next InitUser that hits this
      slot via prepare_lazy_free_head inherits a non-zero last_fee_slot
      / adl_epoch_snap. The next fee sync would compute "elapsed since
      last_fee_slot" against a slot value that belonged to the prior
      occupant — potentially back-charging or under-charging.
      Spec contract is "new accounts seeded at materialization (no
      back-charge)." Verify engine.reclaim_empty_account_not_atomic
      zeroes EVERY field of Account including cursors.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      reclaim_flat_zero_account_if_eligible (5177), Account struct
      cursors (last_fee_slot, adl_epoch_snap)

  # ===================================================================
  # FAMILY U-resolved — Resolved-mode branches (ForceCloseResolved,
  # SettleAccount, ConvertReleasedPnl-in-Resolved, etc.)
  # ===================================================================

  - id: U19-force-close-resolved-no-signer-required
    class: authorization
    severity: Medium
    bug_class: permissionless-write-with-no-signer
    claim: >
      ForceCloseResolved at src/percolator.rs:10127-10235 sets:
      accounts::expect_writable(a_slab)? but NEVER calls
      accounts::expect_signer on ANY account. The instruction performs
      collateral::withdraw at 10227 (CPI to SPL Token transfer) to the
      account's owner_ata, with the program's vault PDA signing. The
      owner_ata is checked only via verify_token_account when
      amt_units > 0 (10201-10202). An attacker can therefore submit
      ForceCloseResolved against ANY user_idx (after the
      force_close_delay window) and the user's funds get transferred
      to their own ATA — benign for the user. BUT: there is no
      requirement that the user's ATA exists at the destination
      verified. If the user's ATA is closed (rent-recovered), the SPL
      transfer reverts. The user is then stuck — anyone can repeatedly
      submit ForceCloseResolved against them, perpetually failing on
      ATA-missing while consuming the keeper's CU.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      ForceCloseResolved (10127-10235)

  - id: U20-resolvedcrank-early-return-skips-recurring-fees
    class: state_transition
    severity: Medium
    bug_class: resolved-fee-accumulation-skip
    claim: >
      KeeperCrank in resolved mode at src/percolator.rs:6902-6921
      returns Ok(()) immediately after the resolved-context check
      WITHOUT calling sync_account_fee_to_slot_not_atomic on any
      account. Recurring maintenance fees CANNOT be charged in resolved
      mode via the crank path. force_close_resolved_with_fee_not_atomic
      DOES handle fees per-account on close — but a slab where users
      delay closing past resolve indefinitely accumulates "free
      storage" without fee debt advancing. Spec contract: "maintenance
      fees are wrapper-owned, charged on every account-touching
      instruction." Resolved-mode never touches accounts via crank, so
      fees freeze at resolve_slot. Verify this is intentional (resolved
      markets are read-only) vs. a fee-revenue leak (if maintenance
      fees fund insurance, resolved-but-not-closed markets pay zero).
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      KeeperCrank resolved early-return (6902-6921), recurring
      fee accumulation in resolved mode

  - id: U21-permissionless-resolve-bypass-engine-init-check
    class: authorization
    severity: Medium
    bug_class: init-state-resolve-bypass
    claim: >
      ResolvePermissionless at src/percolator.rs:10039-10125 calls
      slab_guard + require_initialized + market_mode != Resolved + then
      checks engine.last_oracle_price != 0 at 10109-10112. But there's
