# Tier-C unchanged-code re-audit for Percolator perpetual DEX.
#
# Authored 2026-05-10 against HEAD e2ed66cc63bcb95da55f2e3955c7cae1419093ec.
# Targets the ~5,800 lines of `src/percolator.rs` UNCHANGED since F7 baseline
# c3c941eb. Those lines were audited when the existing 165 percolator-tagged
# hyps were written, but new findings (F7 itself + 138 diff-targeted hyps
# written today) revealed bug-class patterns the prior library does not
# encode at the granularity these surfaces deserve.
#
# Methodology: read 165 existing hyps + 138 new-diff hyps, then re-read
# unchanged code regions looking for instruction-pair interactions,
# admin-path state-machine seams, resolved-mode branches, account
# lifecycle init->close->reinit paths, sysvar handling, and arithmetic
# boundary cases that the prior library treats only at the "engine
# invariant" level (V*, P*, O*, etc.) without binding to specific
# wrapper call sites.
#
# ID prefix: U for unchanged-code re-audit. Each entry names a specific
# function or code path, is falsifiable via LiteSVM, and does NOT
# duplicate an existing hyp's claim.

hypotheses:

  # ===================================================================
  # FAMILY U-admin — Admin-path state-machine seams
  # Surface: UpdateConfig, ResolveMarket, TopUpInsurance,
  # WithdrawInsurance, WithdrawInsuranceLimited, UpdateAuthority,
  # CloseSlab, AdminForceCloseAccount, PushHyperpMark
  # ===================================================================

  - id: U1-updateconfig-tvl-cap-mult-zero-disables-cap-mid-flight
    class: state_transition
    severity: High
    bug_class: admin-config-mid-flight-invariant-shift
    claim: >
      UpdateConfig at src/percolator.rs:8880-9071 mutates
      config.tvl_insurance_cap_mult without any check that in-flight
      DepositCollateral/InitUser/InitLP calls (which read this cap at lines
      6418, 6661) cannot be sandwich-bypassed by an admin who lowers the
      cap_mult to zero in a slot between the user's read and write.
      Specifically: there is no per-tx atomicity binding the cap_mult value
      seen at deposit-time risk gate to the cap_mult committed at engine
      mutation time. Admin sets cap_mult = X at slot N; user submits
      Deposit reading cap_mult at slot N+1; admin sets cap_mult = 0 at
      slot N+2; user's deposit executes at N+3 with stale-read cap that
      no longer reflects current admin intent. The admin can only TIGHTEN
      via this path (config is written by admin, not user), but the
      sequence admits SURPRISE FROZEN-DEPOSIT race that strands user funds
      mid-tx.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      UpdateConfig (8880-9071), DepositCollateral cap check (6661-6674),
      InitUser cap check (6418-6437)

  - id: U2-updateconfig-funding-params-stale-in-flight-trades
    class: state_transition
    severity: High
    bug_class: admin-config-mid-flight-invariant-shift
    claim: >
      UpdateConfig mutates funding_horizon_slots, funding_k_bps,
      funding_max_premium_bps, funding_max_e9_per_slot (9060-9064)
      AFTER compute_current_funding_rate_e9 captured the pre-change rate
      at line 8946. The captured rate is used for catchup_accrue +
      accrue_market_to at 9046-9049. But any TRADE submitted between
      slot of capture and slot of commit reads a different rate from the
      same config fields — there is no version counter binding "rate
      captured for accrue X" to "rate visible to in-flight trades."
      Cross-instruction sequence: admin UpdateConfig at slot N captures
      rate R; a trade at slot N+1 reads new params and computes rate R';
      attacker chooses to fill into the gap where engine accrued at R
      but trade priced at R', extracting the funding delta.
    applies_to: [percolator]
    scope_conditions: [perpetual_funding]
    target_file: src/percolator.rs
    relevant_instructions: |
      UpdateConfig lines 8946-9070, compute_current_funding_rate_e9,
      TradeNoCpi/TradeCpi funding_rate_e9 capture

  - id: U3-pushhyperp-mark-uses-Clock-get-not-clock-account
    class: implicit_invariant
    severity: Medium
    bug_class: sysvar-source-divergence
    claim: >
      PushHyperpMark at src/percolator.rs:9112 calls Clock::get()
      (syscall) whereas every other instruction reads Clock from a
      passed AccountInfo via Clock::from_account_info(a_clock). Two
      different code paths read the SAME sysvar two different ways.
      The two paths are functionally equivalent today but diverge when
      Solana runtime alters sysvar account-vs-syscall semantics (e.g.,
      account-based reads may include skipped-leader transitional
      slots whereas syscall reads may not). A wrapper that uses both
      patterns introduces a hidden asymmetry. Verify: PushHyperpMark
      mark-stale gate at 9113 vs ResolveMarket gate at 9306 — do they
      agree on which "slot" matures the market?
    applies_to: [percolator]
    scope_conditions: [hyperp_mode]
    target_file: src/percolator.rs
    relevant_instructions: |
      PushHyperpMark (9073-9215), UpdateAuthority (5723), ResolveMarket
      (9254), other instructions all use Clock::from_account_info

  - id: U4-resolvepermissionless-no-signer-required
    class: authorization
    severity: Medium
    bug_class: keeper-cursor-budget-bypass
    claim: >
      ResolvePermissionless at src/percolator.rs:10055-10125 calls
      accounts::expect_len(2) but does NOT call expect_signer on either
      slab or clock. The instruction can be triggered by a transaction
      where the fee-payer is the attacker — fine for permissionless,
      but the instruction MUTATES engine state (sets MarketMode::Resolved,
      writes hyperp_mark_e6) at line 10122-10124. There is no signer
      providing intent-to-resolve. Combined with the lack of a CU-burn
      precondition, an attacker can resolve EVERY market reaching the
      hard-timeout in a single tx by listing them all sequentially.
      Verify: is there a non-trivial per-market cost (CU, account-lock
      contention) that prevents mass-resolve griefing of all markets
      hit by an oracle outage?
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      ResolvePermissionless (10039-10125)

  - id: U5-withdrawinsurancelimited-cooldown-bypass-on-first-call
    class: state_transition
    severity: High
    bug_class: cooldown-bypass-first-call
    claim: >
      WithdrawInsuranceLimited at line 9651-9656 bypasses cooldown when
      last_insurance_withdraw_slot == 0 (first call after init). After
      ResolveMarket clears the live insurance state (or operator was
      newly created via UpdateAuthority AUTHORITY_INSURANCE_OPERATOR
      after a long idle period), config.last_insurance_withdraw_slot
      remains at 0 if no prior call was made — letting a fresh operator
      with no cooldown burn drain bps_cap in the first slot. Verify: a
      market that initialized with insurance_withdraw_max_bps > 0 but
      where no live withdrawal ever fired, then transferred operator
      authority — can the new operator make an UNCAPPED-by-cooldown
      first call?
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      WithdrawInsuranceLimited (9567-9738), specifically 9651-9656
      cooldown check + UpdateAuthority AUTHORITY_INSURANCE_OPERATOR
      path at 5798-5807

  - id: U6-withdraw-insurance-limited-min-floor-vs-cooldown-amplifies
    class: state_transition
    severity: High
    bug_class: liveness-vs-drain-asymmetry
    claim: >
      WithdrawInsuranceLimited at 9669-9672 uses
      cap = max(bps_cap, MIN_WITHDRAW_FLOOR_UNITS=10), clamped to insurance.
      The MIN_FLOOR is intentional anti-Zeno. But the cooldown at 9653
      gates on TOTAL slots elapsed since last call, not on dt-since-last
      AND amount-drained-since-anchor. An operator can therefore drain
      MIN_FLOOR=10 every cooldown_slots window indefinitely, even when
      bps × insurance < 10 (i.e., insurance is so small the cap would
      otherwise be sub-1-unit). Combined with U5 (first-call cooldown
      bypass), an operator can grief-drain a near-empty insurance pool
      to zero in O(insurance/10) tx with cooldown-amortized cost.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      WithdrawInsuranceLimited (9567-9738), constant
      MIN_WITHDRAW_FLOOR_UNITS = 10 (9587)

  - id: U7-updateauthority-burn-admin-bypasses-mark-init
    class: authorization
    severity: Medium
    bug_class: admin-burn-config-irreversible
    claim: >
      UpdateAuthority AUTHORITY_HYPERP_MARK burn path at
      src/percolator.rs:5794-5796 requires mark_ewma_e6 != 0 before
      allowing burn. But the gate is on mark_ewma_e6, not on
      hyperp_mark_e6 or last_mark_push_slot. A fresh Hyperp market with
      one PushHyperpMark (setting hyperp_mark_e6 and mark_ewma_e6 via
      ewma_update) can satisfy the gate. After burn, no further
      PushHyperpMark is possible — the market relies on existing mark
      to bootstrap EWMA via subsequent trades. If mark_ewma_e6 was set
      to the first push but trade activity is insufficient to keep
      max(mark_ewma_last_slot, last_mark_push_slot) within
      3×max_staleness_secs, ResolveMarket on Ordinary settles at stale
      EWMA — admin set a one-shot price then locked it in. Verify the
      burn invariant captures the LIVE liveness signal not just
      bootstrap-of-EWMA.
    applies_to: [percolator]
    scope_conditions: [hyperp_mode]
    target_file: src/percolator.rs
    relevant_instructions: |
      handle_update_authority AUTHORITY_HYPERP_MARK burn path
      (5784-5797), PushHyperpMark EWMA write (9205-9214)

  - id: U8-closeslab-stranded-vault-tokens-routed-to-admin-not-insurance
    class: state_transition
    severity: Medium
    bug_class: terminal-cleanup-routes-funds-to-admin
    claim: >
      CloseSlab at src/percolator.rs:8815-8833 drains stranded vault
      tokens (vault.amount > engine.vault.is_zero() residue —
      unsolicited transfers, sub-scale dust) to admin's ATA, not to
      remaining users via pro-rata distribution. Admin captures stranded
      funds at terminal step. Spec frame: "stranded = unsolicited
      transfers + dust" — but in practice the engine's c_tot tracking
      could disagree with vault.amount by amounts users contributed
      pre-resolve (e.g., a deposit whose engine credit failed
      post-SPL-transfer). Verify: does any flow exist where a user's
      funds become "stranded" in the vault sense AND are not refunded
      before CloseSlab? If so, admin can extract them.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      CloseSlab (8750-8869), drain logic (8810-8834)

  - id: U9-resolvemarket-degenerate-deviation-band-bypass
    class: state_transition
    severity: High
    bug_class: oracle-deviation-band-bypass
    claim: >
      ResolveMarket mode=1 (Degenerate) at src/percolator.rs:9263-9301
      settles at engine.last_oracle_price with rate=0, with NO
      resolve_price_deviation_bps check on the chosen settlement price
      vs anything (because p_last is the engine's own anchor by
