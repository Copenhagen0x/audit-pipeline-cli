# Verifiable conservation laws + arithmetic invariants for Percolator.
#
# Authored 2026-05-10 as part of Tier C re-audit pass. Targets:
# Kani / exhaustive bounds-check / symbolic-execution friendly invariants.
# Surface: conservation laws + arithmetic invariants + edge bounds in
# - C:\Users\btrco\percolator-audit\percolator\src\percolator.rs  (engine)
# - C:\Users\btrco\percolator-audit\percolator\src\wide_math.rs   (256-bit math)
# - C:\Users\btrco\percolator-audit\percolator-prog\src\percolator.rs (wrapper policy)
#
# F7 is encoded as V1 (the *strict* form). All hyps in this file are
# precisely stateable as math claims and verifiable with bounded compute.

hypotheses:

  - id: V1-residual-conservation-strict
    class: invariant_property
    severity: Critical
    bug_class: insurance-counter-vault-divergence
    engine_function: settle_flat_negative_pnl_not_atomic
    prior_disclosure:
      pr: https://github.com/aeyakovenko/percolator-prog/pull/39
      decision: rejected
      rationale: >
        Strict-equality variant of H1 residual-conservation rejected by
        PR #39. The team's intentional design uses inequality V >= C+I
        with absorption remaining in residual.
      regression_test: tests/test_a1_siphon_regression.rs
      decision_date: 2026-04-20
    claim: >
      Define R = vault - c_tot - insurance_fund.balance (the senior
      residual, saturated at 0 on deficit). For every public _not_atomic
      entrypoint E and every reachable pre-state S, if E(S) succeeds
      yielding S', then R(S') == R(S) + delta where delta is exactly:
      (capital_deposited - capital_withdrawn) + (insurance_topped_up -
      insurance_withdrawn) summed over the call. In particular,
      use_insurance_buffer / record_uninsured_protocol_loss MUST leave R
      unchanged. Strict equality, not just check_conservation's
      inequality V >= C+I.
    applies_to: [percolator]
    scope_conditions: [has_insurance_pool]
    target_file: src/percolator.rs
    relevant_instructions: |
      use_insurance_buffer (2291), record_uninsured_protocol_loss (2319),
      absorb_protocol_loss (2326), settle_flat_negative_pnl_not_atomic,
      every callsite that mutates insurance_fund.balance.

  - id: V2-haircut-redistribution-conservation
    class: invariant_property
    severity: Critical
    bug_class: haircut-direction-violation
    engine_function: absorb_protocol_loss
    claim: >
      Define paid_out(state) = sum over claimers of haircut_ratio.apply(claim).
      For any two reachable states S1 -> S2 connected by a sequence of
      effective_matured_pnl reads, sum_i effective_matured_pnl(i) <=
      residual(state) AND <= pnl_matured_pos_tot(state). Haircut function
      is monotone non-increasing in pnl_matured_pos_tot / non-decreasing
      in residual.
    applies_to: [percolator]
    scope_conditions: [has_haircut_accounting]
    target_file: src/percolator.rs

