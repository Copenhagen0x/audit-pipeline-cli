      is the only gate before fopen.

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ program_c.c â€” Worker â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  - id: CMED19-program-c-enqueue-import-double-free
    class: memory_safety
    severity: Critical
    bug_class: double-free
    engine_function: enqueue_import
    target_file: src/program_c.c
    claim: >
      In `enqueue_import`, the failure-path code reads
      `job_free(job); job_free(job);` â€” TWO consecutive `job_free`
      calls on the same pointer in the same statement block. When
      `job_queue_push` fails, this immediately double-frees the Job
      allocation (including its payload). Critical â€” direct path to
      heap corruption via the standard double-free pattern.
    relevant_instructions: |
      Inspect enqueue_import's job_queue_push failure branch â€” the
      two adjacent `job_free(job)` calls are the bug.

  - id: CMED20-program-c-run-report-payload-oob-read
    class: memory_safety
    severity: High
    bug_class: oob-read
    engine_function: run_report
    target_file: src/program_c.c
    claim: >
      `run_report` formats `snprintf(report, needed, "...payload=%s",
      ..., job->payload ? (char *)job->payload : "")` â€” using
      `job->payload` as a C string. But `job->payload` is allocated
      and populated by `job_new` via `malloc(payload_len)` +
      `memcpy(payload, src, payload_len)` with NO NUL terminator
      appended. If the payload byte stream contains no `'\0'` within
      payload_len bytes (which is the common case for binary
      payloads), `%s` reads past the allocation looking for the
      terminator â€” out-of-bounds read, potential info-leak into the
      report buffer (and onward into the log stream).
    relevant_instructions: |
      Cross-reference run_report's `%s` use of job->payload against
      job_new's malloc+memcpy (no NUL append).
