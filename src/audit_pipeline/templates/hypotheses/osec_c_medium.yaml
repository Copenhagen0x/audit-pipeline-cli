  - id: CMED16-program-a-handle-get-network-format-string
    class: format_string
    severity: Critical
    bug_class: format-string-injection
    engine_function: handle_get
    target_file: src/program_a.c
    claim: >
      In the cache-miss branch of `handle_get`, the code calls
