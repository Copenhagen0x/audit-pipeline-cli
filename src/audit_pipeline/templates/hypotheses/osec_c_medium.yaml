    class: format_string
    severity: Critical
    bug_class: format-string-injection
    engine_function: log_message
    target_file: src/common/log.c
    claim: >
      `log_message(logger, level, message)` forwards `message` to
      `log_write(logger, level, message)`, which executes `vfprintf(
      logger->stream, message, ap)` â€” `message` is consumed as the
      format string with no varargs supplied. Any caller passing
      attacker-controlled bytes (`%s`/`%n`/`%p` specifiers) into
      log_message gets arbitrary read / write primitives. Direct
      parallel of c-small CSMALL09 audit_sink but in the generic
      logger; reachable from every module that includes common/log.h.
    relevant_instructions: |
      Trace log_message -> log_write -> vfprintf. The bug is that
      log_message passes `message` to log_write as the `fmt` parameter.

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ common/config.c â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  - id: CMED14-config-get-int-silent-overflow
    class: integer_overflow
    severity: Medium
    bug_class: integer-truncation
    engine_function: config_get_int
    target_file: src/common/config.c
    claim: >
      `config_get_int` calls `strtol(v, &end, 10)` and only checks for
      no-digits-consumed and trailing-garbage. It does NOT check
      `errno == ERANGE`. For a value string outside the long range
      (e.g. `"99999999999999999999"`), strtol returns LONG_MAX/LONG_MIN
      with errno=ERANGE, and the code returns `(int)LONG_MAX` â€” which
      on platforms where sizeof(long) > sizeof(int) further truncates,
      producing a near-random `int` value silently. Callers that gate
      security-relevant limits (max retries, max payload, etc.) on
      this return value can be steered to nonsense values by config
      poisoning.
    relevant_instructions: |
      Inspect the strtol check at the tail of config_get_int â€” confirm
      ERANGE is never tested.

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ vendor/minihash/map.c â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  - id: CMED15-minihash-hashdos
    class: dos
    severity: Medium
    bug_class: hash-collision-dos
    engine_function: hash_key
    target_file: src/vendor/minihash/map.c
    claim: >
      `hash_key` is a textbook FNV-1a 32-bit hash with no secret seed.
      Bucket count is fixed at init time (251 for the Db, 127 for the
      SessionStore) and never grown. An attacker who can submit
      arbitrary keys (e.g. via FRAME_PUT or FRAME_AUTH) can pre-compute
      a set of keys that all hash to the same bucket modulo 251 (or
      127), turning `map_put`/`map_get`/`map_remove` into O(N) per
      call against that bucket. Classic HashDoS pattern.
    relevant_instructions: |
      Inspect hash_key (no seed) and map_init (fixed nbuckets, no
      rehash); attacker controls keys via every public map_put caller.

