  - id: CMED17-program-a-handle-auth-deterministic-token
    class: crypto_weakness
    severity: High
    bug_class: weak-token-derivation
    engine_function: handle_auth
    target_file: src/program_a.c
    claim: >
      `handle_auth` derives the session token via
      `snprintf(token, sizeof(token), "token-%s", user)`. The token
      is `"token-<username>"` â€” fully deterministic and trivially
      forgeable. An attacker who knows or guesses a target username
      can compute the exact token offline and submit it as the
      session id on subsequent requests. No entropy, no HMAC, no
      timestamp â€” same defect class as c-small CSMALL11 but the
      attack is even cheaper because the construction is plaintext-
      visible.
    relevant_instructions: |
      The `snprintf(token, sizeof(token), "token-%s", user)` line
      inside handle_auth.

