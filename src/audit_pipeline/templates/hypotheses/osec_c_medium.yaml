  - id: CMED18-program-b-handle-import-symlink-traversal
    class: input_validation
    severity: High
    bug_class: path-traversal-symlink
    engine_function: handle_import
    target_file: src/program_b.c
    claim: >
      `handle_import` calls `runtime_is_safe_path(daemon->base_dir,
