    every proposal regardless of vote outcome or `max_hint`. The `max_hint` parameter is added to `state.version` but never
    bounds the loop. Every pending proposal is silently marked not-ready in one call.

    '
- id: APTL28-lending-pool-open-position-bypasses-pause
