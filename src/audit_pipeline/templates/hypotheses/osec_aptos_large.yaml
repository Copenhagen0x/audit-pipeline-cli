    and `deposit(user, host, asset_id, collateral)`. The cross-module `credit` calls do not consult `paused` on lending_pool,
    collateral_manager, or debt_accounting. Only the final `deposit` check would abort; by then accounting has already mutated,
    leaving partial state on pause.

    '
