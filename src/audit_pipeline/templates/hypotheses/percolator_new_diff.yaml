  - id: A1-rc-refcell-lifetime-via-clone
    class: implicit_invariant
    severity: High
    bug_class: rust-lifetime-extension-via-rc-clone
    claim: >
      The bridge's Rc<RefCell<&mut [u8]>> is cloned into AccountInfo
      structs. Inside the processor, AccountInfo is .clone()'d into CPI
      args at e.g. src/percolator.rs:4027-4030 (collateral::deposit/
      withdraw) and lines 8856-8860 (CloseSlab). Each clone bumps the
      Rc's refcount, extending the lifetime of the inner `&mut [u8]`
      beyond the original Vec. The compiler accepts this because the
      Rc::clone is an unsafe lifetime extension via `'a` smuggling.
      Practically, the Rcs are all dropped at function return, so memory
      stays valid. But the Rust type system does NOT enforce that.
    applies_to: [percolator]
    scope_conditions: [anchor_v2_runtime]
    target_file: src/percolator.rs

