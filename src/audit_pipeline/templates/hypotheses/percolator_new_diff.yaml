  - id: A1-borrow-state-bypass
    class: implicit_invariant
    severity: High
    bug_class: pinocchio-borrow-state-desync
    claim: >
      The bridge constructs `&mut u64` and `&mut [u8]` raw references via
      unsafe at src/percolator.rs:10322-10328 and wraps them in
      Rc<RefCell<_>>. It NEVER touches RuntimeAccount.borrow_state.
      Pinocchio uses borrow_state to track active borrows; the bridge
      leaves it at NOT_BORROWED while two `&mut` references into the
      same RuntimeAccount fields are alive. Any nested CPI to an Anchor
      v2 callee that constructs an AccountView over the same *raw and
      tries try_borrow_mut() will succeed (borrow_state says NOT_BORROWED)
      and obtain a second `&mut [u8]` aliasing the same bytes — Rust UB.
    applies_to: [percolator]
    scope_conditions: [anchor_v2_runtime]
    target_file: src/percolator.rs

  - id: A1-aliased-lamports-mut-ref
    class: implicit_invariant
    severity: High
    bug_class: rust-aliasing-rawmut-into-runtime-account
    claim: >
      Line 10322: `let lamports_ref = unsafe { &mut (*raw).lamports };`
      creates a `&mut u64` into the SVM-resident RuntimeAccount.lamports
      field. Solana's CPI runtime ALSO acquires `&mut` access to the same
      field during invoke_signed (to update lamports post-CPI). Two `&mut`
      references to the same u64 violate Rust's aliasing rules. In BPF
      this is "fine" because the CPI runtime suspends the caller's stack
      frame and the Rust-level &mut is not actively used during invoke,
      but a sufficiently-smart compiler may reorder lamport reads/writes
      around the invoke point assuming sole ownership.
    applies_to: [percolator]
    scope_conditions: [anchor_v2_runtime]
    target_file: src/percolator.rs

