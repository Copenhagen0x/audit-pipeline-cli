  - id: A1-matcher-realloc-frozen-ctx-len
    class: state_transition
    severity: Critical
    bug_class: post-cpi-stale-data-length
    claim: >
      TradeCpi (src/percolator.rs:8049-8079) issues invoke_signed to a
      caller-supplied matcher program with caller-supplied a_matcher_ctx,
      then at line 8064 calls a_matcher_ctx.try_borrow_data() and parses
      the matcher's return blob. The Anchor v2 bridge
      (src/percolator.rs:10298-10354) snapshots data_len once at top-of-
      entrypoint into a `&mut [u8]` slice built via
      `from_raw_parts_mut(ptr, (*raw).data_len as usize)` (line 10324-10328)
      and wraps it in Rc<RefCell<&mut [u8]>>. The slice length is FROZEN —
      never re-read from RuntimeAccount.data_len after CPI. A malicious
      matcher (controlled at LP InitLP time via
      engine.accounts[lp_idx].matcher_program) writes attacker-favorable
      MatcherReturn bytes into ctx data BEFORE shrinking data_len via a
      nested CPI to system_program reallocation. The post-invoke borrow
      in percolator reads through the bridge's stale 64-byte slice -> sees
      attacker bytes that pass abi_ok (req_id matches because matcher
      sets it), enabling attacker-chosen exec_price_e6 and exec_size.
    applies_to: [percolator]
    scope_conditions: [anchor_v2_runtime]
    target_file: src/percolator.rs
    relevant_instructions: |
      TradeCpi handler around lines 7700-8200, zc::invoke_signed_trade
      (lines 1628-1649), matcher_abi::read_matcher_return (line 1679+),
      policy::abi_ok, process_with_legacy_account_infos (10298-10354)
    relevant_constants: |
      size_of::<RuntimeAccount>() = 88, MATCHER_CALL_LEN, FLAG_VALID = 1,
      FLAG_PARTIAL_OK = 2, FLAG_REJECTED = 4

