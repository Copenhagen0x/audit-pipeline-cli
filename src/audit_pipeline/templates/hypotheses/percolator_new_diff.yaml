  - id: O1-leg-publish-time-rewind
    class: invariant_property
    severity: High
    bug_class: oracle-monotonicity-violation
    claim: >
      `read_external_price_e6` returns `max_publish_time` derived only from the
      current read's leg publish times, but `clamp_external_price` then writes
      this value into `config.last_oracle_publish_time` whenever the read
      `advanced`. If leg 1 advances (newer timestamp) while leg 2 stays at the
      same prior timestamp that is older than the previously written
      `last_oracle_publish_time` (which had been set to a `max_publish_time`
      that happened to be leg 2's older time), the field can rewind backwards.
      In particular the max returned is `max(this_read_leg_timestamps)`, NOT
      `max(this_read, stored)`, so a 3-leg setup where the laggard leg has
      strictly older timestamp than the previously stored composite `max`
      can REWIND `last_oracle_publish_time`, which is used by downstream
      anti-replay logic and `last_good_oracle_slot` accounting.
    applies_to: [percolator]
    scope_conditions: [toto_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      oracle::read_external_price_e6 (lines 3596-3658)
      oracle::clamp_external_price (lines 3708-3744)

  - id: O2-leg-conflict-bypass-zero-prev
    class: state_transition
    severity: Critical
    bug_class: oracle-confidence-bypass
    claim: >
      The same-publish-time conflict check at `read_external_price_e6` is gated on
      `prev_time != 0` AND `prev_price != 0`. At init, all `oracle_leg_publish_times`
      and `oracle_leg_prices_e6` are zeroed for Hyperp markets, AND for an active
      leg whose first observation had `publish_time == 0` (legitimate from Pyth Pull
      raw timestamp 0 or a fresh test feed), the previous-time storage will remain
      0 even after acceptance because the inner `if publish_time > prev_time` only
      writes when strictly greater. A subsequent read with the same timestamp and
      a different price BYPASSES the conflict check (the `prev_time != 0` guard
      fails), permitting silent same-slot price flapping that walks
      `last_effective_price_e6` one cap-step per replay.
    applies_to: [percolator]
    scope_conditions: [toto_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      oracle::read_external_price_e6 (lines 3629-3651)

  - id: O3-divide-leg-tiny-leg2-amplification
    class: arithmetic_overflow
    severity: High
    bug_class: oracle-composition-overflow
    claim: >
      `compose_oracle_leg` in `divide` mode computes `acc * 1_000_000 / leg`. If
      attacker can make `leg_e6 == 1` (smallest non-zero), the composite price
      explodes by factor 1e6. The post-composition `MAX_ORACLE_PRICE` check catches
      `next > MAX_ORACLE_PRICE`, but for moderate `acc` (say `acc = 100_000_000`
      and leg = 1), `next = 1e8 * 1e6 / 1 = 1e14`, exceeds MAX_ORACLE_PRICE so
      aborts. For `acc = 1` and `leg = 1`, `next = 1e6`, accepted. If a Pyth
      confidence + raw price legitimately produces a tiny `leg_e6` (e.g. far-decimal
      token after invert+scale), one attacker-supplied leg can dominate the cross.
      No check that leg2/leg3 produce sensible cross.
    applies_to: [percolator]
    scope_conditions: [toto_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      oracle::compose_oracle_leg (lines 3563-3585)
      oracle::read_external_price_e6 (call site at line 3648)

  - id: O4-invert-after-compose-mismatch
    class: invariant_property
    severity: High
    bug_class: oracle-scale-mismatch
    claim: >
      `read_external_price_e6` composes legs via `compose_oracle_leg` (multiplies/
      divides at e6 scale) BEFORE applying `apply_engine_price_transform` (invert
      + unit_scale). No consistency check that the composite `acc` is in the
      correct scale for the configured `invert` flag — `invert == 1` means raw is
      inverted (1e12 / raw), so the composite of multiple raw legs is treated as
      one raw e6 value and inverted as a whole. For a cross like ETH/SOL where
      leg1=ETH-USD multiplied, leg2=SOL-USD divided, invert=1 mathematically gives
      SOL/ETH. If admin configures the flags for one currency convention but the
      wire-time invert flag is wrong, the composite silently produces a meaningful
      but WRONG cross.
    applies_to: [percolator]
    scope_conditions: [toto_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      oracle::read_external_price_e6 (line 3653-3657)
      oracle::oracle_leg_config_ok (lines 3530-3561)

