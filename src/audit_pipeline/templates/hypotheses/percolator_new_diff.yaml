      oracle slot — junk, an attacker-owned account, or even the slab itself —
      and the handler accepts it. CU griefing today; potential future foot-gun
      if a reviewer adds a sanity probe on oracle_accounts[0] BEFORE the
      is_hyperp_mode check.
    applies_to: [percolator]
    scope_conditions: [hyperp_dynamic_fees]
    target_file: src/percolator.rs
    relevant_instructions: |
      processor::oracle_account_count (lines 5377-5384)
      oracle::get_engine_oracle_price_e6 Hyperp branch (lines 3929-3983)

