  - id: SOLD40-gov-timelock-execute-delay-bypass
    class: invariant_property
    severity: Medium
    bug_class: missing-access-control
    engine_function: "GovernanceTimelock.queue4"
    target_file: src/modules/GovernanceTimelock.sol
    claim: >
      GovernanceTimelock.queue4 / queue9 / queue10 each register an
      action with an `eta` (execute-after timestamp). executeAction4
      and executeAction1 then check that `block.timestamp >= eta`
      before running the action. One queue variant uses a different
      delay constant than the executeAction check expects, OR sets
      `eta = block.timestamp + delay` while the check is
      `block.timestamp > eta` (off-by-one strict-vs-loose). A
      proposer who routes their action through the buggy variant can
      execute one block earlier than the timelock advertises, OR can
      avoid the timelock entirely if the variant skips the eta
      assignment.
    relevant_instructions: |
      GovernanceTimelock.queue4 / 9 / 10 + executeAction4 / 1 — all
      three queue paths must set `eta = block.timestamp + MIN_DELAY`
      with the same `MIN_DELAY` constant the executeAction check
      uses. Standardise the strict comparison: `if (block.timestamp
      < eta) revert ContractCInvalidState();` (loose ≥, never `>`).

  - id: SOLD41-portfolio-margin-evaluate-adjust-mismatch
