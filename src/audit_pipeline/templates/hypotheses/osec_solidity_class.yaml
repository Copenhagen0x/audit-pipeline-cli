# OtterSec evaluation — Solidity / EVM language hypothesis library.
#
# Designed for the sahuang-osec/solidity-{small,medium,large} synthetic-
# bug repos. This library is GROUNDED — every entry below cites a real
# bug surface present in the target's contracts. Hypothesis IDs use the
# SOLD prefix to keep them separable from SOL* (Solana).
#
# As we move to solidity-medium and solidity-large we EXPAND this file
# with the new bug surfaces those repos introduce — we do NOT rewrite.
#
# Each hypothesis is a binary "is this invariant violated?" question.
# L2 PoC uses Foundry `forge test` with bug-witness inverted assertions
# (assert_*_fires patterns). L3 uses Halmos symbolic execution (Kani is
# Rust-only — Halmos is the Solidity equivalent, runs against the same
# Foundry test sources). L4 uses anvil-deployed bytecode + forge test to
# replay the exploit through actual EVM execution.
#
# Run with:
#   audit-pipeline hunt \
#     --hypotheses .../osec_solidity_class.yaml \
#     --language solidity \
#     --refinement-rounds 1 \
#     --max-concurrent 4
#
# Solidity / EVM-specific notes:
#   * `tx.origin` is the EOA at the START of a tx chain — using it for
#     auth lets a malicious contract proxy a victim's call. Always use
#     `msg.sender` for auth checks.
#   * `block.timestamp` is miner-influenceable within ~15s; never use
#     it for randomness or fine-grained ordering.
#   * Reentrancy: in the CEI (Checks-Effects-Interactions) pattern,
#     ALL state writes must happen BEFORE external calls. Solidity
#     `transfer()` returning false is a recoverable signal, but
#     malicious tokens (ERC777 with `_callTokensReceived`, fee-on-
#     transfer, rebase) can invoke arbitrary code during transfer.
#   * Signature replay: signed messages MUST bind a nonce, the chainId,
#     and a deadline. EIP-712 is the canonical pattern.
#   * Governance flash-loan attack: vote weight read at vote time from
#     `balanceOf` (instead of from a checkpointed snapshot) means an
#     attacker can flash-loan governance tokens, vote, and return them
#     in a single tx.
#   * `approve()` race condition: setting non-zero allowance over an
#     existing non-zero allowance is unsafe for USDT-style tokens that
#     require `approve(spender, 0)` first.

hypotheses:

  # ─────────────────── ContractA — Vault (ContractA.sol) ───────────────────

  - id: SOLD1-vault-withdraw-reentrancy
    class: invariant_property
    severity: High
    bug_class: reentrancy-cei-violation
    engine_function: "ContractA.withdraw"
    target_file: src/ContractA.sol
    claim: >
      In ContractA.withdraw(shares, receiver), all state writes
      (shareBalance, totalShares, totalManagedAssets) MUST complete
      before any external token transfer. The current implementation
      performs `asset.transfer(receiver, …)` and the fee-recipient
      transfer BEFORE decrementing shareBalance/totalShares, so a
      malicious asset token (ERC777 / fee-on-transfer / rebase with
      hooks) can re-enter `withdraw` while the caller's shareBalance
      is still full and drain the vault.
    relevant_instructions: |
      ContractA.withdraw — lines that perform `asset.transfer` BEFORE
      `shareBalance[msg.sender] = shareBalance[msg.sender] - shares`.

  - id: SOLD2-vault-share-inflation-first-depositor
    class: arithmetic_overflow
    severity: High
    bug_class: share-inflation
    engine_function: "ContractA.deposit"
    target_file: src/ContractA.sol
    claim: >
      In ContractA.deposit, share computation uses
      `ShareMath.toShares(amount, totalShares, asset.balanceOf(this))`
      where `balanceOf` includes any direct token transfers to the
      vault address. An attacker who is the first depositor donates
      a large amount directly to the vault, then floor-division in
      `toShares` makes any subsequent victim deposit smaller than
      the donation round to 0 shares — the victim's principal is
      permanently confiscated.
    relevant_instructions: |
      ContractA.deposit + ShareMath.toShares (libraries/ShareMath.sol)
      — the (totalShares * amount / balance) floor expression.

  - id: SOLD3-vault-pause-bypass-on-state-mutations
    class: authorization
    severity: Low
    bug_class: missing-pause-modifier
    engine_function: "ContractA.setDelegate"
    target_file: src/ContractA.sol
    claim: >
      ContractA.setDelegate and ContractA.requestWithdraw mutate user
      state but lack the `whenNotPaused` modifier present on every
      other state-changing function (deposit, withdraw,
      delegatedTransfer). When the contract is paused for emergency
      response, attackers can still register a delegate / pre-arm a
      withdrawal timer, defeating the pause's purpose.
    relevant_instructions: |
      ContractA.setDelegate, ContractA.requestWithdraw — both
      declared without `whenNotPaused`.

  # ─────────────────── ContractB — Lending pool (ContractB.sol) ───────────────────

  - id: SOLD4-pool-set-oracle-missing-onlyowner
    class: authorization
    severity: Critical
    bug_class: missing-access-control
    engine_function: "ContractB.setOracle"
    target_file: src/ContractB.sol
    claim: >
      ContractB.setOracle is callable by ANY address. The oracle is
      the sole price source feeding `_isSolvent` (used by withdraw,
      borrow, liquidate) — an attacker swaps it for a contract that
      returns an arbitrary price, then withdraws all collateral
      and/or liquidates healthy positions for free.
    relevant_instructions: |
      ContractB.setOracle — declaration is missing the `onlyOwner`
      modifier that protects every other admin-mutating setter
      (setRiskParams, transferOwnership, etc).

  - id: SOLD5-pool-repay-overcharges-on-excess
    class: invariant_property
    severity: High
    bug_class: overcharge-on-cap
    engine_function: "ContractB.repay"
    target_file: src/ContractB.sol
    claim: >
      In ContractB.repay(account, amount), the local variable that
      caps repayment to outstanding debt is computed correctly
      (`applied = min(amount, debt)`) but the subsequent
      `debtToken.transferFrom(msg.sender, address(this), amount)`
      pulls the UNCAPPED amount from the payer. The account is
      credited only `applied`; the excess `amount - applied` is
      taken from the user and locked in the contract with no
      mechanism to recover it.
    relevant_instructions: |
      ContractB.repay — compare the `transferFrom` argument to the
      cap computed two lines above; they must match for the
      repay-overpay invariant to hold.

  - id: SOLD6-pool-oracle-no-staleness-check
    class: invariant_property
    severity: High
    bug_class: oracle-staleness
    engine_function: "ContractB._isSolvent"
    target_file: src/ContractB.sol
    claim: >
      ContractB._isSolvent (called from withdraw, borrow, liquidate)
      consumes `oracle.price(collateralToken)` with no freshness or
      publish-time check. The IOracle interface has no `updatedAt`
      field, so a stale price during oracle outage is silently
      accepted. An attacker borrows against artificially-high
      collateral OR triggers liquidations against artificially-low
      collateral.
    relevant_instructions: |
      ContractB._isSolvent, ContractB.liquidate — every oracle.price()
      consumer must validate `block.timestamp - updatedAt <= MAX_AGE`
      before using the price.

  - id: SOLD7-pool-liquidate-collateral-clamp-leaks-debt
    class: invariant_property
    severity: Medium
    bug_class: liquidation-accounting-drift
    engine_function: "ContractB.liquidate"
    target_file: src/ContractB.sol
    claim: >
      ContractB.liquidate clamps the seized collateral when the
      computed amount exceeds `account.collateral` (`if (seize >
      collateral) seize = collateral;`), but the repaid debt is NOT
      similarly reduced — the liquidator pays full `applied` debt
      yet receives less collateral than the bonus-adjusted formula
      requires. For under-collateralised positions this means the
      protocol absorbs the shortfall by under-paying the liquidator,
      which discourages liquidations and lets bad debt accumulate.
    relevant_instructions: |
      ContractB.liquidate — the clamp `if (seize > collateral) seize
      = collateral` and the absence of a paired reduction in
      `applied` debt.

  # ─────────────────── ContractC — Governance + Bridge (ContractC.sol) ───────────────────

  - id: SOLD8-bridge-tx-origin-auth
    class: authorization
    severity: Critical
    bug_class: tx-origin-auth
    engine_function: "ContractC.bridgeToken"
    target_file: src/ContractC.sol
    claim: >
      ContractC.bridgeToken authenticates the caller with
      `tx.origin == owner` instead of `msg.sender == owner`. An
      attacker who tricks the owner into calling ANY function on a
      malicious contract can have that malicious contract call
      `bridgeToken`, with `tx.origin` still equal to the owner —
      bridging arbitrary tokens to an attacker-controlled chain.
    relevant_instructions: |
      ContractC.bridgeToken — the `if (!(tx.origin == owner))`
      auth check. Must be `msg.sender == owner` (or use a proper
      `onlyOwner` modifier consistent with the rest of CoreBase).

  - id: SOLD9-gov-vote-weight-flash-loanable
    class: state_transition
    severity: Critical
    bug_class: flash-loan-governance
    engine_function: "ContractC.vote"
    target_file: src/ContractC.sol
    claim: >
      ContractC.vote reads voter weight as
      `governanceToken.balanceOf(msg.sender)` at vote time, with no
      snapshot / checkpoint mechanism. An attacker takes a flash
      loan of governance tokens, calls `vote(proposalId)` accruing
      arbitrary `yesVotes`, and repays the loan in the same tx —
      passing any proposal regardless of legitimate token holdings.
    relevant_instructions: |
      ContractC.vote — the `governanceToken.balanceOf(msg.sender)`
      read. Compare to OpenZeppelin's `ERC20Votes` snapshot pattern;
      this contract has none.

  - id: SOLD10-gov-sig-replay-no-nonce-no-chainid
    class: authorization
    severity: Critical
    bug_class: signature-replay
    engine_function: "ContractC.executeBySig"
    target_file: src/ContractC.sol
    claim: >
      ContractC.executeBySig recovers a signer from
      `keccak256(abi.encodePacked(address(this), proposalId, voter))`.
      The digest binds neither a nonce, the chainId, nor a deadline.
      Once any valid signature is exposed, anyone can replay it
      forever AND replay it on any forked chain with the same
      governance contract deployed at the same address (CREATE2 /
      cross-chain risk).
    relevant_instructions: |
      ContractC.executeBySig — the `keccak256(abi.encodePacked(…))`
      digest. EIP-712 with `block.chainid`, a per-account `nonces[]`
      mapping, and a `deadline` parameter is the canonical fix.

  - id: SOLD11-gov-distribute-rewards-dos-on-single-failure
    class: invariant_property
    severity: Medium
    bug_class: dos-on-batch-transfer
    engine_function: "ContractC.distributeRewards"
    target_file: src/ContractC.sol
    claim: >
      ContractC.distributeRewards loops over voters and reverts the
      ENTIRE batch if any single `transfer` returns false (or the
      voter is a contract that reverts on `receive`/`transfer`).
      One griefing voter (or a denylisted address for tokens with
      blocklists) freezes all reward distribution for that proposal.
      Pull-based claim instead of push-based pay is the canonical
      fix.
    relevant_instructions: |
      ContractC.distributeRewards — the `for` loop and the
      `revert("REWARD_PAY_FAILED")` on transfer failure.

  - id: SOLD12-gov-distribute-rewards-dust-loss
    class: arithmetic_overflow
    severity: Low
    bug_class: rounding-favors-protocol
    engine_function: "ContractC.distributeRewards"
    target_file: src/ContractC.sol
    claim: >
      ContractC.distributeRewards computes per-voter reward as
      `total / voters.length` (floor division). When the division is
      not exact, `total - sum(per_voter * voters.length)` dust is
      transferred from the funder but never paid out to any voter —
      it accumulates in the contract with no mechanism to sweep.
      Small per-call, but unbounded over many proposals.
    relevant_instructions: |
      ContractC.distributeRewards — `total / voters.length` floor.

  - id: SOLD13-bridge-approve-race-non-zero-reset
    class: invariant_property
    severity: Low
    bug_class: approve-race-condition
    engine_function: "ContractC.bridgeToken"
    target_file: src/ContractC.sol
    claim: >
      ContractC.bridgeToken calls `approve(bridge, amount)` without
      first zeroing any existing allowance. USDT-style tokens revert
      when transitioning from a non-zero allowance to a different
      non-zero allowance, breaking bridging for that token class.
      Use `forceApprove` / `safeIncreaseAllowance` (OZ SafeERC20) or
      set 0 first.
    relevant_instructions: |
      ContractC.bridgeToken — the `_v_90056359.approve(address(bridge),
      _v_f3e87bc1)` line.

  # ─────────────────── solidity-MEDIUM additions (SOLD14+) ───────────────────
  # New bug surfaces introduced by the medium repo:
  #   * 8 modules (strategy, rewards, treasury, escrow, oracle, orders,
  #     bridge, rate model) + 5 libraries + 5 base classes
  #   * cross-chain governance via bridgeAdapter
  #   * delegatecall execution path
  #   * Initializable / front-runnable init
  #   * signature-based orders (replay surface beyond ballots)
  #   * pull-based reward epochs

  - id: SOLD14-vault-set-strategy-missing-access-control
    class: authorization
    severity: Critical
    bug_class: missing-access-control
    engine_function: "ContractA.setStrategy"
    target_file: src/ContractA.sol
    claim: >
      ContractA.setStrategy has NO access-control modifier (no
      `onlyGovernor`, no `onlyOperator`). Any address can swap the
      strategy contract. Since `totalAssets()` reads
      `strategy.totalAssets()` and `_ensureIdle` calls
      `strategy.withdraw`, a malicious strategy returns arbitrary
      values that manipulate share price (inflate/deflate at will)
      and silently fail withdrawals while emitting Withdraw events.
      The asset-equality check (`newStrategy.asset() != address(asset)`)
      delegates to attacker code and can be bypassed trivially.
    relevant_instructions: |
      ContractA.setStrategy — the function signature `external` with
      no modifier. Add `onlyGovernor` and a two-step ack pattern.

  - id: SOLD15-vault-total-assets-double-counts-managed
    class: arithmetic_overflow
    severity: Critical
    bug_class: share-inflation
    engine_function: "ContractA.totalAssets"
    target_file: src/ContractA.sol
    claim: >
      ContractA.totalAssets returns `idle + invested + totalManaged`.
      After `deposit`, both `asset.balanceOf(this)` (idle) AND
      `totalManaged` are credited with the deposited amount, so
      totalAssets double-counts the same principal. After `invest`
      moves the assets to the strategy, `strategy.totalAssets()`
      reflects the principal AND `totalManaged` is unchanged — still
      double-counted. Share price inflates by ~2x against expected,
      breaking deposit/redeem accounting and the high-water-mark
      performance-fee logic.
    relevant_instructions: |
      ContractA.totalAssets — the `idle + invested + totalManaged`
      expression. ContractA.deposit / withdraw / harvest — every
      `totalManaged += assets` / `totalManaged -= assets` line.

  - id: SOLD17-gov-execute-uses-delegatecall-storage-takeover
    class: authorization
    severity: Critical
    bug_class: missing-access-control
    engine_function: "ContractC.execute"
    target_file: src/ContractC.sol
    claim: >
      ContractC.execute executes proposal payloads via
      `p.target.delegatecall(p.data)`. Delegatecall runs the target's
      bytecode in ContractC's storage context, so any passing
      proposal can write to ContractC's storage slots — overwriting
      `governor`, `governanceToken`, `proposalThreshold`,
      `quorumVotes`, etc. A single passing proposal whose `target`
      points to attacker bytecode takes over the entire governance
      contract regardless of further on-chain checks. Standard
      governors use `call`, not `delegatecall`.
    relevant_instructions: |
      ContractC.execute — the `p.target.delegatecall(p.data)` line.
      Replace with `p.target.call{value: p.value}(p.data)` and
      include the value in the call (Compound/OZ Governor pattern).

  - id: SOLD18-gov-queue-cross-chain-replay-arbitrary-payload
    class: invariant_property
    severity: High
    bug_class: missing-access-control
    engine_function: "ContractC.queueCrossChain"
    target_file: src/ContractC.sol
    claim: >
      ContractC.queueCrossChain is permissionless, accepts
      caller-supplied `dstChain`, `receiver`, and `payload`, and
      doesn't check `executedCrossChain[proposalId]` before firing.
      Once any proposal enters the Queued state, ANY address can use
      that proposal to send arbitrary cross-chain messages claiming
      governance authorization — and can do so repeatedly, since
      the `executedCrossChain` flag is set but never read as a
      precondition. The payload should be derived from the proposal
      itself (target/data), not from the caller.
    relevant_instructions: |
      ContractC.queueCrossChain — the function should (a) restrict
      caller, (b) derive payload from the proposal, (c) check
      `!executedCrossChain[proposalId]` before sending, (d) emit
      Executed state transition (or a dedicated CrossChainExecuted
      state) instead of leaving the proposal as Queued.

  - id: SOLD19-order-signed-replay-drains-maker-approval
    class: invariant_property
    severity: High
    bug_class: signature-replay
    engine_function: "OrderSettlement.openSignedOrder"
    target_file: src/modules/OrderSettlement.sol
    claim: >
      OrderSettlement.openSignedOrder validates a signature whose
      digest (in SignatureLib.recoverOrder) is
      `keccak256(ORDER_TYPEHASH, maker, tokenIn, tokenOut, amountIn,
      minOut, deadline)` — the signed hash does NOT include the
      maker's nonce, the chainId, or the verifying contract. A single
      signature is therefore valid until `deadline` and replayable:
      each replay increments makerNonces (rotating the resulting
      orderId) AND pulls `amountIn` from the maker via
      `safeTransferFrom`, draining the maker's approval to this
      contract.
    relevant_instructions: |
      libraries/SignatureLib.sol recoverOrder — bind the maker's
      current nonce inside the typed-data digest, plus the EIP-712
      domain (chainId + verifyingContract). Mark the signed message
      consumed BEFORE pulling `amountIn`.

  - id: SOLD20-initializable-unprotected-initialize-frontrun
    class: authorization
    severity: High
    bug_class: missing-access-control
    engine_function: "ContractC.initialize"
    target_file: src/ContractC.sol
    claim: >
      ContractC.initialize is gated only by the `initializer` modifier
      (sets a one-shot `initialized` flag) — there is no caller
      restriction. After deployment, the deployer's `initialize` tx
      sits in the mempool until mined; an attacker frontruns with
      their own initialize call (their own `governanceToken_`,
      `proposalThreshold_`, `quorumVotes_`) — the `initialized` flag
      flips, the deployer's tx reverts, and ContractC is now bound to
      attacker-controlled parameters. Standard fix: require
      `msg.sender == deployer` (capture in constructor) or merge
      init into the constructor.
    relevant_instructions: |
      base/Initializable.sol — add a `deployer` field captured in
      ContractC's constructor and require `msg.sender == deployer`
      inside `initialize`, OR move all init logic into the
      constructor.

  - id: SOLD22-strategy-donation-inflates-fee-shares
    class: invariant_property
    severity: Medium
    bug_class: share-inflation
    engine_function: "SimpleStrategy.harvest"
    target_file: src/modules/SimpleStrategy.sol
    claim: >
      SimpleStrategy.harvest reports `gainOrLoss = balanceOf(this) -
      accountedAssets` and updates `accountedAssets = balance`. Any
      address can transfer `assetToken` directly to the strategy
      address — the next `ContractA.harvest` then sees a positive
      gain, computes a performance fee, and mints fee shares to
      `feeRecipient`. The attacker pays the donation; existing
      LP holders are silently diluted by the unjust fee mint.
    relevant_instructions: |
      SimpleStrategy.harvest — separate "donated" surplus from
      "earned" yield (track principal explicitly, or require
      gains via a privileged `report()` call). ContractA.harvest —
      bound the fee-share mint to gains attributable to strategy
      activity, not raw balance drift.

  - id: SOLD23-reward-distributor-set-recipient-corrupts-epoch-weight
    class: arithmetic_overflow
    severity: Medium
    bug_class: liquidation-accounting-drift
    engine_function: "RewardDistributor.setRecipient"
    target_file: src/modules/RewardDistributor.sol
    claim: >
      RewardDistributor.setRecipient calls
      `epochs.addWeight(epochs.current(), weight)` on EVERY update —
      it adds the new weight to the current epoch's total but never
      subtracts the recipient's previous weight. Reducing a
      recipient's stake from 100 to 50 ADDS 50 to the epoch total
      (now 100 + 50 = 150 for one user); zeroing a recipient adds 0
      (the old 100 is still counted). claim() then divides
      `reward * stakeWeight / totalWeight` — the inflated
      denominator under-pays everyone, or over-pays when the new
      weight is larger and the old weight is still counted.
    relevant_instructions: |
      RewardDistributor.setRecipient — read the previous
      `stakeWeight[account]`, compute `delta = newWeight - oldWeight`,
      and apply `epochs.weights[epoch] += delta` (signed). Or
      checkpoint per-epoch weights at distribution time, not on
      every setRecipient call.

  - id: SOLD26-lending-liquidate-cei-collateral-transfer
    class: invariant_property
    severity: Medium
    bug_class: reentrancy-cei-violation
    engine_function: "ContractB.liquidate"
    target_file: src/ContractB.sol
    claim: >
      ContractB.liquidate transfers `collateralAsset` to the liquidator
      BEFORE calling `decreaseDebt` and updating `p.collateral`. If
      `collateralAsset` is a hookable token (ERC777 with
      `tokensReceived`, fee-on-transfer with callbacks, rebase tokens
      with arbitrary code), the liquidator can re-enter liquidate()
      against the same still-unhealthy borrower whose debt and
      collateral haven't been decremented yet — extracting collateral
      multiple times per liquidation.
    relevant_instructions: |
      ContractB.liquidate — move `decreaseDebt(...)` and
      `p.collateral -= seized` BEFORE
      `collateralAsset.safeTransfer(msg.sender, seized)`. Apply CEI
      strictly.

  - id: SOLD27-lending-batch-liquidate-no-collateral-seized
    class: invariant_property
    severity: Critical
    bug_class: liquidation-accounting-drift
    engine_function: "ContractB.batchLiquidate"
    target_file: src/ContractB.sol
    claim: >
      ContractB.batchLiquidate pulls `repayAmount` from the caller via
      `safeTransferFrom`, calls `positions[borrower].decreaseDebt(...)`
      to reduce the borrower's debt, but NEVER transfers any
      collateral to the caller. The liquidator pays the borrower's
      debt down and receives nothing — strict, unbounded loss any
      time someone calls this function. Equivalently, anyone can
      grief liquidators by sandwiching a single-account liquidate()
      with a batchLiquidate() that erases the bad-debt incentive.
    relevant_instructions: |
      ContractB.batchLiquidate — the loop body must compute `seized`
      from `repayAmount`, clamp by `p.collateral`, transfer that
      collateral to `msg.sender`, and decrement `p.collateral` —
      i.e., mirror the single-account `liquidate()` logic per
      iteration.

  - id: SOLD28-escrow-disputed-state-permanently-locks-funds
    class: invariant_property
    severity: Medium
    bug_class: liquidation-accounting-drift
    engine_function: "EscrowBook.dispute"
    target_file: src/modules/EscrowBook.sol
    claim: >
      EscrowBook.dispute transitions an escrow to the `Disputed`
      state but the contract exposes no function that can release,
      refund, or otherwise exit the `Disputed` state. All other
      state-mutating functions (`release`, `refund`) require the
      state to be `Open` and revert otherwise. Once disputed, the
      escrowed tokens are permanently locked in the contract — even
      the governor cannot recover them.
    relevant_instructions: |
      EscrowBook — add a `resolveDispute(uint256, address winner)`
      function gated by `onlyGovernor` (or an arbiter role) that
      transitions Disputed -> Released/Refunded and pays out
      accordingly. Or auto-resolve disputes after a timeout.

  # ────────── Re-anchor of SOLD8 + SOLD11 for medium ──────────
  # The small-repo SOLD8 (bridgeToken tx.origin) and SOLD11
  # (ContractC.distributeRewards push-loop) don't exist as-named
  # in solidity-medium — ContractC has different functions there.
  # The bug CLASSES still apply, just at different code anchors.
  # SOLD29 + SOLD30 re-target the same patterns to medium's actual
  # functions. Keeping SOLD8 / SOLD11 in the library because they
  # are still grounded in solidity-small.

  - id: SOLD29-gov-emergency-pay-tx-origin-auth
    class: authorization
    severity: Critical
    bug_class: tx-origin-auth
    engine_function: "ContractC.emergencyPay"
    target_file: src/ContractC.sol
    claim: >
      ContractC.emergencyPay authenticates the caller with
      `if (tx.origin != governor) revert ContractCNotOriginGovernor();`
      and then performs an unrestricted `IERC20(token).safeTransfer(to, amount)`
      to a caller-supplied recipient. The function has NO `onlyGovernor`
      modifier and ANY address can invoke it. The single check uses
      `tx.origin` instead of `msg.sender` — any contract that tricks the
      governor EOA into calling ANY function on a malicious contract
      (airdrop claim, dApp interaction, phishing) can have that
      malicious contract call `emergencyPay` with `tx.origin == governor`
      still true and drain arbitrary tokens out of the treasury to the
      attacker's chosen `to` address.
    relevant_instructions: |
      ContractC.emergencyPay — replace the `tx.origin != governor` check
      with `onlyGovernor` (modifier checks `msg.sender == governor`).
      Both the missing access-control modifier on the function and the
      `tx.origin`-instead-of-`msg.sender` use are bugs; the canonical
      fix addresses both at once.

  - id: SOLD30-reward-distributor-push-loop-dos
    class: invariant_property
    severity: Medium
    bug_class: dos-on-batch-transfer
    engine_function: "RewardDistributor.distributeEpoch"
    target_file: src/modules/RewardDistributor.sol
    claim: >
      RewardDistributor.distributeEpoch loops over `recipients[]` and
      calls `rewardToken.safeTransfer(account, amount)` for each one.
      `safeTransfer` REVERTS on transfer failure (returning-false token
      or a recipient contract that reverts in `tokensReceived` /
      `receive`). A single griefing recipient (denylisted address on a
      blocklist token like USDC/USDT, or a contract that reverts in its
      receive hook) DoSs the entire epoch's distribution for everyone.
      The `claim()` pull-pattern partially mitigates (per-recipient
      claims still work), but the operator-friendly batch path is
      fully bricked.
    relevant_instructions: |
      RewardDistributor.distributeEpoch — wrap each `safeTransfer` in
      a `try { ... } catch { continue; }` block so one bad recipient
      doesn't poison the batch. Or remove distributeEpoch entirely and
      force pull-only via `claim()` (the canonical pattern).

  - id: SOLD31-lending-borrow-permit-sig-no-chainid
    class: invariant_property
    severity: Critical
    bug_class: signature-replay
    engine_function: "ContractB.permitBorrow"
    target_file: src/ContractB.sol
    claim: >
      ContractB.permitBorrow validates a signature whose digest (in
      SignatureLib.recoverBorrowPermit) is
      `keccak256(abi.encodePacked("BORROW_PERMIT", borrower, asset, amount, deadline))`.
      The signed hash does NOT include the borrower's nonce, the
      chainId, or the verifying contract address. A signature is valid
      until `deadline` and replayable: each replay overwrites
      `borrowAllowance[borrower][delegate]` with the signed amount,
      which the delegate can then drain via `borrowFrom` in the same
      tx. Cross-chain replay is also possible — the same signature
      authorizes borrowing on every chain where ContractB is deployed
      at the same address (and even on forks at unrelated addresses
      if the verifying contract isn't bound). Standard EIP-712 fixes
      both: bind chainid + verifyingContract in the domain separator
      and bump a per-borrower nonce inside the typed-data struct.
    relevant_instructions: |
      ContractB.permitBorrow + libraries/SignatureLib.sol — switch
      recoverBorrowPermit to an EIP-712 typed-data digest that binds
      `block.chainid`, `address(this)`, and a monotonically-incrementing
      `nonces[borrower]`. Bump the nonce after a successful recover so
      a replayed signature recovers a different (likely zero) address
      and reverts at the `signer == borrower` check.

  - id: SOLD32-gov-proposal-sig-no-chainid
    class: invariant_property
    severity: Critical
    bug_class: signature-replay
    engine_function: "ContractC.proposeBySig"
    target_file: src/ContractC.sol
    claim: >
      ContractC.proposeBySig validates a signature whose digest (in
      SignatureLib.recoverProposal) is
      `keccak256(abi.encodePacked("PROPOSAL", proposer, target, value, keccak256(data)))`.
      The signed hash does NOT include the proposer's nonce, the
      chainId, or the verifying contract address. Once the proposer
      meets `governanceToken.balanceOf >= proposalThreshold` and
      produces ONE signature, an attacker can replay it to file the
      same proposal multiple times across forks/chains, and re-file
      after the proposal state is cleared. The downstream
      `proposals[proposalId].state != None` check only prevents
      replay AT THE SAME ID within one chain — fork-replay produces
      a distinct proposalId on the fork and still executes.
    relevant_instructions: |
      ContractC.proposeBySig + libraries/SignatureLib.sol — switch
      recoverProposal to an EIP-712 typed-data digest that binds
      `block.chainid` and `address(this)`, plus a per-proposer
      monotonic nonce inside the typed-data struct (bumped on
      successful recover).

  - id: SOLD33-vault-share-inflation-via-idle-donation
    class: invariant_property
    severity: Critical
    bug_class: share-inflation
    engine_function: "ContractA.totalAssets"
    target_file: src/ContractA.sol
    claim: >
      ContractA.totalAssets returns
      `assetToken.balanceOf(this) + totalStrategyDebt − lockedProfitDecay`.
      `idleAssets()` reads `balanceOf(this)` directly, which includes
      any tokens transferred to the vault address outside of `deposit()`.
      The `lockedProfit` mechanism only decays profits reported by
      strategies via `report()`; direct token donations bypass it
      entirely. An attacker who is the first depositor (or any
      depositor before a victim) donates a large amount directly to
      the vault, then floor-division in `ShareMath.assetsToShares`
      makes the victim's `deposit` round to 0 shares — the principal
      is permanently confiscated. Same root pattern as the SOLD2
      first-depositor donation attack but on the lockedProfit-style
      vault.
    relevant_instructions: |
      ContractA.totalAssets — drop `idleAssets()` and account only
      through the ledger that `deposit` / `report` / `recallDebt`
      mutate (e.g. a `totalManaged` counter). Donations land in the
      vault's balance but do NOT inflate share price. Equivalent fix:
      have `deposit` consume `_amountIn` from the user via
      `safeTransferFrom` AFTER snapshotting `pre = idleAssets()`,
      then mint shares against `(amount - (idleAssets() - pre - amount))`
      so donations are sterilised on the first deposit that
      witnesses them.

  - id: SOLD34-price-router-zero-staleness-disables-check
    class: invariant_property
    severity: High
    bug_class: oracle-staleness
    engine_function: "PriceRouter.price"
    target_file: src/modules/PriceRouter.sol
    claim: >
      PriceRouter.price gates its staleness check on
      `if ((!(config.maxStaleness == 0) && (block.timestamp > updatedAt + maxStaleness))) revert`.
      When `maxStaleness == 0`, the left operand of `&&` is false and
      the comparison short-circuits — NO staleness check runs.
      `setSource(asset, src, 0)` and `setManualSource(asset, 0)` are
      both callable by `RISK_ROLE` and silently disable freshness for
      that asset. A compromised RISK_ROLE key can pin a stale price
      indefinitely, letting an attacker borrow against inflated
      collateral or trigger liquidations against deflated collateral
      hours/days after the true price has moved.
    relevant_instructions: |
      PriceRouter.price — invert the guard so `maxStaleness == 0`
      reverts (`PriceRouterUnconfigured`) rather than disables the
      check. Or, treat 0 as a sentinel for "use default max staleness"
      and apply a non-zero protocol-wide minimum (e.g. 1 hour).
      `setSource`/`setManualSource` should reject `maxStaleness == 0`
      at the setter level so it never persists.

  - id: SOLD35-bridge-escrow-lock-variant-constant-drift
    class: invariant_property
    severity: High
    bug_class: accounting-drift
    engine_function: "BridgeEscrow.lock4"
    target_file: src/modules/BridgeEscrow.sol
    claim: >
      BridgeEscrow exposes three near-identical `lock4 / lock9 / lock10`
      entrypoints. Each variant rewrites the same record's
      `lockedValue`, `pending`, `credits[owner]`, and `debits[owner]`
      using a SLIGHTLY DIFFERENT set of constants in the index multiplier
      (`globalIndex + 4e15` vs `+9e15` vs `+10e15`) and claim-value
      computation (`claimedValue + 7*x` vs `+12*x` vs `+10*x`). The
      pending-vs-debit split uses the same `/ 2` and `/ 8` divisors
      across all three. One variant has a wrong constant that
      systematically over- or under-credits the owner on every call,
      drifting `credits[owner]` away from `debits[owner]`. After many
      calls the global accounting (`totalActive`, `totalPending`,
      `totalSettled`) diverges from per-record sums by an attacker-
      controllable margin, letting the owner of a stale record claim
      excess value through `claim4/claim1` at settlement time.
    relevant_instructions: |
      BridgeEscrow.lock4 / lock9 / lock10 — collapse the three
      variants into a single function with the correct constants
      (the constants in lock10 appear to be the canonical reference;
      lock4 and lock9 each drift in one direction). The credit/debit
      split must equal the rounding remainder of the divisor
      (e.g. `credits += (delta - (delta / 2))` so credits + delta/2
      always exactly equals `delta`).

  - id: SOLD36-modules-set-operator-instant-takeover
    class: invariant_property
    severity: High
    bug_class: missing-access-control
    engine_function: "BridgeEscrow.setOperator"
    target_file: src/modules/BridgeEscrow.sol
    claim: >
      Across all 10 modules (BridgeEscrow, FeeDistributor, RiskEngine,
      PortfolioMargin, TreasuryAccounting, GovernanceTimelock,
      AuctionHouse, StrategyRegistry, SettlementEngine, …)
      `setOperator(address newOp) external onlyOperator { operator = newOp; }`
      instantly replaces the operator with no timelock, no two-step
      accept (`acceptOperator` pattern), no escrow window, and no
      revocation of the old key. A compromised operator key —
      whether through phishing, a leaked HSM credential, or a
      malicious insider — translates directly into full unilateral
      takeover of every privileged operation in the module, with no
      recovery window for the protocol admin to intervene. Because
      `setOperator` is the FIRST function an attacker calls after
      compromise (locking out the legitimate operator), there is no
      catch-up monitoring that can reverse it.
    relevant_instructions: |
      Each module's `setOperator` — implement the two-step
      `transferOperator` / `acceptOperator` pattern. `transferOperator`
      stores the pending operator in `pendingOperator` and emits
      `OperatorTransferStarted`. `acceptOperator` (callable only by
      `pendingOperator`) finalises the change AFTER `block.timestamp
      >= pendingOperatorAfter` where `pendingOperatorAfter` is set
      to `block.timestamp + OPERATOR_TIMELOCK` (e.g. 48 hours).
      During the timelock, the current operator can `cancelOperatorTransfer`.

  - id: SOLD37-debt-ledger-reduce-debt-global-decoupling
    class: invariant_property
    severity: High
    bug_class: accounting-drift
    engine_function: "DebtLedger._reduceDebt"
    target_file: src/modules/DebtLedger.sol
    claim: >
      DebtLedger._reduceDebt updates the global counter with
      `totalDebtByAsset[asset] = (actualReduction > totalDebtByAsset[asset]) ? 0 : totalDebtByAsset[asset] - actualReduction;`.
      The guard silently snaps the global to zero whenever the
      per-account reduction exceeds the tracked total. This happens
      legitimately when one borrower's `currentDebt` grew via
      interest (`addDebt` updates the principal but interest accrues
      via the AccountingLib `index`) faster than other reductions
      tracked the global. Repeated reductions cumulatively decouple
      `totalDebtByAsset[asset]` from `Σ debts[borrower][asset]`.
      Downstream consumers that compare a borrower's debt against
      the global (e.g. utilisation-based interest curves, per-asset
      borrow caps, treasury reserve calls) silently use a stale
      undercount and let new borrowers exceed the intended cap.
    relevant_instructions: |
      DebtLedger._reduceDebt — when `actualReduction >
      totalDebtByAsset[asset]`, this indicates interest-accrual
      divergence rather than a math error. Re-snapshot the global
      from the sum of per-account currentDebts (or maintain
      `totalDebtByAsset` as a true sum that's incremented in
      `_increaseDebt` and decremented BY THE SAME amount as the
      per-account `subDebt` returns — never zero out as a fallback).

  - id: SOLD38-fee-distributor-accrue-distribute-drift
    class: invariant_property
    severity: Medium
