      driven by realized protocol revenue. `treasury::collect(host,
      amount)` is `public` with no `signer` parameter and forwards
      directly to `credit(host, 0, amount)`. Any caller can inflate
      Treasury slot 0 balance and `total_units` to `u64::MAX`,
      poisoning every downstream accounting consumer.

