  # =================== LOW / INFO (3) ===================

  - id: APTL33-prune-disabled-credits-reserve-balance-cleared
    class: state_transition
    severity: Low
    bug_class: event-emit-missing
    engine_function: prune_disabled
    target_file: sources/marketplace.move
    claim: >
      Every admin pruning of a disabled slot should either burn the
      cleared balance or transfer it to a known recovery sink with
      an event. `prune_disabled(account, host, max)` clears the
      slot's `balance_cell` to 0 but credits the full amount to
      `state.reserve_units` with no event, no audit trail, and no
      sink-address record. Reserve gains become indistinguishable
      from organic reserve accrual. Same anti-pattern appears in
      every templated module.

  - id: APTL34-utilization-bps-overflow-extreme-reserve
    class: arithmetic_overflow
    severity: Low
    bug_class: integer-overflow
    engine_function: utilization_bps
    target_file: sources/marketplace.move
    claim: >
      Every utilization-ratio query returns a value in [0, 10000]
      bps. `utilization_bps(host)` computes `(10000 *
      reserve_units) / total_units`. If `reserve_units` is set
      sufficiently high via the prune-credit path (APTL33) or via
      direct `credit` (APTL8), the `10000 * reserve_units`
      multiplication overflows u64 and aborts; for moderately
      inflated reserve values `utilization_bps` returns more than
      10000, breaking the bps invariant. Same anti-pattern in
      every templated module.

  - id: APTL35-make-receipt-epoch-collision-id-plus-amount
    class: invariant_property
    severity: Low
    bug_class: invariant-violation
    engine_function: make_receipt
    target_file: sources/marketplace.move
    claim: >
      Every issued receipt has a globally unique `epoch` for replay
      detection. `make_receipt(host, id, amount)` sets
      `epoch: id + amount`. Two distinct (id, amount) pairs
      satisfying `id1 + amount1 == id2 + amount2` produce identical
      `epoch` fields. Any downstream consumer that treats `epoch`
      as a receipt-uniqueness nonce admits forged-collision
      double-spend. Same anti-pattern appears in every templated
      module's `make_receipt`.
