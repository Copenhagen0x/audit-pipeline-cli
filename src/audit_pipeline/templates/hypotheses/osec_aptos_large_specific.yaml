# OSec eval - Aptos . large
#
# Targeted hypothesis library for the `sahuang-osec/aptos-large`
# engine, derived from manual source-read of 24 modules:
#   asset_registry, auction_house, collateral_manager, debt_accounting,
#   dispute_court, escrow_house, fee_policy, governance, initializer,
#   lending_pool, liquidation_engine, marketplace, math_utils, order_book,
#   price_oracle, proposal_store, rewards, risk_policy, roles, router,
#   treasury, vault_core, vault_limits, voting.
#
# Pair this file with `osec_aptos_class.yaml` (the generic class library)
# at hunt time. The large engine is templated: most modules are the same
# Config skeleton with module-specific names. The high-value bugs are
# (a) the unique non-template public functions, (b) public credit/debit
# wrappers that bypass auth on every module, and (c) the systematic
# ensure_slot helper that ignores the supplied owner_key.
#
# Severity tagged by manual eyeball read against the engine source.
# Layer 1 recon agents will re-validate each invariant against the
# actual source before any L2 PoC fires.

hypotheses:

  # =================== CRITICAL (12) ===================

  - id: APTL1-vault-core-sweep-reserve-no-auth
    class: authorization
    severity: Critical
    bug_class: treasury-drain
    engine_function: sweep_reserve_to
    target_file: sources/vault_core.move
    claim: >
      Every reserve-debiting function on the VaultCore module is
      gated by admin auth. `sweep_reserve_to(host, recipient, amount)`
      is `public` with no `signer` parameter, no `require_manager`
      call, and no auth check. It debits `state.reserve_units` by
      `amount` and credits an attacker-controlled `recipient` slot
      via `locate_or_append`. Any caller can sweep the entire
      reserve into any address.

