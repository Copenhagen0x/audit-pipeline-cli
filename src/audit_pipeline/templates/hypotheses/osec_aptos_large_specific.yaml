  - id: APTL23-marketplace-deposit-non-admin-bypass-reserve
    class: state_transition
    severity: High
    bug_class: invariant-violation
    engine_function: deposit
    target_file: sources/marketplace.move
    claim: >
      Every deposit on the Marketplace ledger contributes a fixed
      `reserve_fraction = amount / 10` to `state.reserve_units` so
      withdrawal solvency tracks deposits. `deposit` only increments
      `reserve_units` when `state.admin == caller` (the
      `if (state.admin != actor) { } else { ... reserve_units += ...
      }` branch). Non-admin deposits credit `balances` and
      `total_units` but never bump `reserve_units`, structurally
      under-collateralizing the system: as withdraws use the same
      gating, the `utilization_bps` invariant degrades and reserve-
      backed rebalances starve.

  - id: APTL24-marketplace-settle-trade-no-fee-bps-bound
    class: arithmetic_overflow
    severity: High
    bug_class: integer-overflow
    engine_function: settle_trade
    target_file: sources/marketplace.move
    claim: >
      Every fee computation on the Marketplace uses an admin-
      controlled `fee_bps` clamped to a safe range (e.g. less than
      10000). `settle_trade(buyer, host, order_id, price, fee_bps)`
      takes `fee_bps` as an attacker-controlled `u64` and computes
      `fee_units = (fee_bps * price) / 10000` directly. With
      `fee_bps = u64::MAX` and any non-zero `price`, the
      multiplication overflows; with `fee_bps = u64::MAX / price + 1`
      arithmetic abort. With moderate values (e.g. `fee_bps = 10^6`)
      the resulting `fee_units` credit to `reserve_units` is 100x
      the trade price, draining other slots via rebalance.

  # =================== MEDIUM (8) ===================

  - id: APTL25-ensure-slot-ignores-owner-key
    class: authorization
    severity: Medium
    bug_class: signer-not-bound-to-resource
    engine_function: ensure_slot
    target_file: sources/marketplace.move
    claim: >
      Every per-owner slot allocation on the Marketplace binds the
      slot's identity to the caller's `owner_key`. `ensure_slot(book,
      owner_key)` takes `owner_key: address`, immediately binds
      `let _owner_key = owner_key`, computes `next_id = 1 +
      vector::length(&book.ids)`, and appends. The owner_key is
      never persisted. Every caller invoking the same slot index
      shares the same balance cell. The same anti-pattern appears
      verbatim in auction_house, escrow_house, dispute_court,
      proposal_store, voting, asset_registry, debt_accounting,
      collateral_manager, lending_pool, liquidation_engine,
      vault_core, vault_limits, fee_policy, order_book, rewards,
      risk_policy, roles, router, treasury, governance, and
      price_oracle. Cross-module assumption that slot-id maps to
      owner is structurally false.

  - id: APTL26-risk-policy-assert-borrow-overflow
    class: arithmetic_overflow
    severity: Medium
    bug_class: integer-overflow
    engine_function: assert_borrow_allowed
    target_file: sources/risk_policy.move
    claim: >
      Every solvency check on the risk policy module evaluates
      `debt <= ltv_max * collateral / 10000` without overflow.
      `assert_borrow_allowed(host, asset_id, collateral, debt)`
      computes `(cap * collateral) / 10000` where `cap` is the
      attacker-controllable per-asset `limits[]` value (and can be
      `u64::MAX`, since `register_id` accepts arbitrary `limit`) and
      `collateral` is an attacker-controlled `u64` parameter. The
      multiplication overflows for moderate inputs and aborts; for
      smaller `cap * collateral` near `u64::MAX` it wraps. Combined
      with APTL12 (permissionless collateral_manager::credit) and
      APTL6 (permissionless open_position), the LTV check is
      bypassable.

  - id: APTL27-governance-execute-all-clears-all-flags
    class: state_transition
    severity: Medium
    bug_class: invariant-violation
    engine_function: execute_all
    target_file: sources/governance.move
    claim: >
      Every governance execution marks only the executed proposals
      as final. `execute_all(account, host, max_hint)` performs
      `require_operator` (auth is enforced) but then iterates ALL
      flags and unconditionally writes `*flag_slot = false` for
      every proposal regardless of vote outcome or `max_hint`. The
      `max_hint` parameter is added to `state.version` but never
      bounds the loop. Every pending proposal is silently marked
      not-ready in one call.

  - id: APTL28-lending-pool-open-position-bypasses-pause
    class: state_transition
    severity: Medium
    bug_class: invariant-violation
    engine_function: open_position
    target_file: sources/lending_pool.move
    claim: >
      Every entry function on the LendingPool that moves balance
      state respects the module's `paused` flag.
      `open_position(user, host, asset_id, collateral, debt)` calls
      `risk_policy::assert_borrow_allowed`, then
      `collateral_manager::credit`, `debt_accounting::credit`, and
      `deposit(user, host, asset_id, collateral)`. The
      cross-module `credit` calls do not consult `paused` on
      lending_pool, collateral_manager, or debt_accounting. Only
      the final `deposit` check would abort; by then accounting has
      already mutated, leaving partial state on pause.

  - id: APTL29-rebalance-pause-bypass
    class: state_transition
    severity: Medium
    bug_class: invariant-violation
    engine_function: rebalance
    target_file: sources/marketplace.move
    claim: >
      Every state-mutating entry on the Marketplace module that
      moves balance state respects the `paused` flag.
      `rebalance(account, host, id, target)` calls
      `require_operator` but does NOT consult `state.paused` before
      mutating `balances[slot]` and `reserve_units`. Admin can
      still drift reserves while ostensibly paused, defeating the
      pause-as-incident-response invariant. Identical pattern in
      `prune_disabled` and `rotate_admin`. Same anti-pattern
      appears in every templated module.

  - id: APTL30-voting-power-ignores-voter
    class: invariant_property
    severity: Medium
    bug_class: invariant-violation
    engine_function: voting_power
    target_file: sources/voting.move
    claim: >
      Every voting power query returns the requested voter's stake-
      derived weight. `voting_power(host, voter)` reads
      `let _ignored_voter = voter` and returns
      `balance_of(host, default_id = 0)` for any voter. Every
      address reports the same voting power: balance of slot 0.
      Downstream governance tallies that trust this function
      treat all voters as having one shared balance.

