- id: CLARGE26-FORMAT_STRING_LOG_USER_EVENT
  title: log_user_event passes attacker message as printf format string
  severity: Critical
  bug_class: format_string
  invariant: 'When user is NULL or empty, log_user_event calls log_msg(logger, LOG_INFO, message) using

    the attacker-supplied message as the format string. Any unescaped conversion specifier in

    message is interpreted by vfprintf, yielding info disclosure or memory corruption.

    '
  affected_files:
  - src/common/log.c
  evidence:
    function: log_user_event
    lines: 62-69
    snippet: "void log_user_event(Logger *logger, const char *user, const char *message) {\n    if ((message)) {\n       \
      \ if (!((user) && (*user))) {\n            log_msg(logger, LOG_INFO, message);\n        } else {\n            log_msg(logger,\
      \ LOG_INFO, \"user=%s event=%s\", user, message);\n        }\n    }\n}\n"
    why: 'The message parameter is forwarded directly as the fmt argument to log_msg, which in turn

      passes it through vfprintf via log_vmsg. The function does not validate that message is a

      safe literal. Same anti-pattern caught in c-medium CMED13.

      '
- id: CLARGE27-FORMAT_STRING_PIPELINE_USER_EVENT
  title: Ingest pipeline forwards attacker-parsed message to vulnerable log_user_event
  severity: Critical
  bug_class: format-string-injection
  target_file: src/ingest/pipeline.c
  engine_function: pipeline_process_line
  claim: |
    pipeline_process_line parses an incoming ingest record via logline_parse,
    which splits the input on '|' into four fields (ts, level, source, message)
    and snprintf-copies each into a fixed buffer on a LogLine struct without
    sanitising conversion specifiers. The function then calls
    `log_user_event(pipe_state->logger, parsed_line.source, parsed_line.message)`.
    log_user_event (CLARGE26) reaches the unsafe path when source is empty or
    NULL and forwards message as the FORMAT STRING to log_msg → vfprintf. The
    message field is therefore a remote format-string primitive: attacker-
    controlled conversion specifiers in the message read or write process
    memory via %s / %n. Mitigation: log_user_event must call log_msg with a
    fixed literal format ("%s") and never accept caller bytes as fmt;
    pipeline_process_line should additionally reject records where source is
    empty so the fallback log path is never reached at all.
  evidence:
    function: pipeline_process_line
    lines: 14-22
    snippet: "if ((logline_parse(&parsed_line, record_text)) == 0) {\n    if ((!logline_is_error(&parsed_line)) || (!pipe_state->logger))\
      \ {\n    } else {\n        log_user_event(pipe_state->logger, parsed_line.source, parsed_line.message);\n    }\n}\n"
    why: 'logline_parse splits record_text on ''|'' into 4 fields and snprintf-copies fields[2]/fields[3]

      into source/message with no sanitization of conversion specifiers. A malicious log record

      with an empty source field and a crafted message field exploits the unsafe code path in

      log_user_event (CLARGE26).

      '
- id: CLARGE28-PATH_TRAVERSAL_LOG_OUT
  title: write_entry builds output path from attacker-controlled source field
  severity: Critical
  bug_class: filesystem_race
  invariant: 'write_entry constructs filename via snprintf("log_%s.out", entry->source) and opens it with

    fopen "ab", with entry->source copied verbatim from the attacker''s record. A source value

    containing path separators escapes the working directory and appends attacker-controlled

    bytes into arbitrary files.

    '
  affected_files:
  - src/program_c.c
  evidence:
    function: write_entry
    lines: 19-32
    snippet: "static int write_entry(void *userdata, const LogLine *entry) {\n    ImportState *state = (ImportState *)userdata;\n\
      \    char filename[128];\n    FILE *handle;\n    if (entry && state) {\n        snprintf(filename, sizeof(filename),\
      \ \"log_%s.out\", entry->source);\n        handle = fopen(filename, \"ab\");\n        if (handle) {\n            fprintf(handle,\
      \ \"%s|%s|%s\\n\", entry->ts, entry->level, entry->message);\n            fclose(handle);\n"
    why: 'entry->source is unvalidated user input. There is no filtering of ''/'', ''..'', or NUL, and

      no O_NOFOLLOW. Symlink-target overwrite, write outside the working directory, and append

      to arbitrary regular files are all reachable from any client that controls a log record.

      '
- id: CLARGE29-TOKEN_UNAUTHENTICATED
  title: token_issue produces unsigned tokens, token_is_admin trusts decoded role field
  severity: Critical
  bug_class: weak-token-format
  target_file: src/auth/token.c
  engine_function: token_issue
  claim: |
    token_issue serialises a token as a plain pipe-delimited string of the form
    "<account>|<role>|<issued>|<expires>" via snprintf into a caller-supplied
    buffer. There is no HMAC, no Ed25519 signature, no AEAD wrapping and no
    secret key of any kind. token_parse splits the same string back into a
    TokenClaims struct and token_is_admin returns true whenever
    `strcmp(parsed->role, "admin") == 0` and the expiry has not passed. Any
    client that can present a token string can therefore forge `role=admin`
    directly by typing "x|admin|0|9999999999" and pass the admin check, because
    no verifier ever checks integrity. Mitigation: emit token as
    `<base64(claims)>.<base64(HMAC_SHA256(claims, server_secret))>`, verify the
    MAC in token_parse before returning success, store the secret in the
    server's runtime config (never round-tripped through the client), and
    constant-time compare the MAC tag.
  evidence:
    function: token_issue and token_is_admin
    lines: 8-20, 50-58
    snippet: "int token_issue(char *buffer, size_t buffer_len, const char *account, const char *access, long lifetime) {\n\
      \    ...\n    if (snprintf(buffer, buffer_len, \"%s|%s|%ld|%ld\", account, access, current, lifetime + current) < (int)buffer_len)\
      \ {\n        return 0;\n    }\nint token_is_admin(const TokenClaims *parsed) {\n    if (parsed) {\n        if ((long)time(NULL)\
      \ <= parsed->expires_at) {\n            return 0 == strcmp(parsed->role, \"admin\");\n        }\n    }\n    return 0;\n\
      }\n"
    why: 'No HMAC, no signature, no secret key, no integrity tag of any kind. The role field is a

      plain string the producer wrote and the parser believes. Mirrors c-medium CMED17 but

      worse: in c-large the role is the sole authorization decision.

      '
- id: CLARGE30-ACL_DOUBLE_WILDCARD_BYPASS
  title: ACL evaluation treats wildcard star in BOTH user and resource as match enabling total bypass
  severity: High
  bug_class: authorization
  invariant: 'acl_check accepts a rule when (entry->user matches name OR entry->user is "*") AND

    (entry->resource matches target OR entry->resource is "*"). A single loaded rule with

    user "*" and resource "*" grants every operation to every caller, and acl_load accepts

    such rules from external text. No default-deny on the wildcard pair.

    '
  affected_files:
  - src/auth/acl.c
  evidence:
    function: acl_check
    lines: 23-37
    snippet: "for (pos = 0; list->count > pos; pos = pos + 1) {\n    const AclRule *entry = &(list->rules[pos]);\n    if ((((0\
      \ != strcmp(entry->user, name)) && (0 != strcmp(entry->user, \"*\"))) ||\n        ((strcmp(entry->resource, target)\
      \ != 0) && (strcmp(entry->resource, \"*\") != 0))) ||\n        (bits != (entry->mask & bits))) {\n        continue;\n\
      \    } else {\n        return 1;\n    }\n}\n"
    why: 'Wildcards on the resource axis are reasonable, but combining them with a wildcard user

      axis with no separate guard turns a single wildcard pair rule into a god-mode grant.

      acl_load reads such rules from a buffer that may be attacker-influenced (config text),

      and there is no rejection or warning when both axes are wildcards.

      '
- id: CLARGE31-INGEST_TRUSTS_REQUEST_ROLE
  title: handle_ingest_request issues admin token from JSON role field supplied by caller
  severity: Critical
  bug_class: authorization-bypass
  target_file: src/program_c.c
  engine_function: handle_ingest_request
  claim: |
    handle_ingest_request reads `account = json_get(&root, "user")` and
    `access = json_get(&root, "role")` directly from the unauthenticated JSON
    request body, then calls `token_issue(encoded, ..., account, access, 3600)`
    to mint a token, `token_parse(&parsed, encoded)` to deserialise it, and
    admits the request when `token_is_admin(&parsed) || strcmp(access, "writer") == 0`.
    Authorization is decided by re-parsing a token the server just minted from
    caller-supplied strings — there is no prior authentication, no signature
    check, and no allow-list of legitimate roles. A request such as
    `{"user":"x","role":"admin","logs":"..."}` self-elevates and authorises the
    CLARGE28 path-traversal and CLARGE27 format-string primitives. Mitigation:
    bind handle_ingest_request to a real session (validate session_id against
    SessionStore before reading the request body), and accept role only from
    the validated Session record, never from the request JSON.
  evidence:
    function: handle_ingest_request
    lines: 40-66
    snippet: "account = json_get(&root, \"user\");\naccess = json_get(&root, \"role\");\ntext = json_get(&root, \"logs\");\n\
      if ((account && access) && text) {\n    if (0 == token_issue(encoded, sizeof(encoded), account, access, 3600)) {\n \
      \       if (0 == token_parse(&parsed, encoded)) {\n            if (token_is_admin(&parsed) || strcmp(access, \"writer\"\
      ) == 0) {\n                session_create(&state->engine.sessions, account, 3600);\n                pipeline_init(&flow,\
      \ &state->engine.logger);\n                return pipeline_process_text(&flow, text, write_entry, state);\n        \
      \    } else return -1;\n"
    why: 'Authorization is decided by re-parsing a token the server just minted from caller-supplied

      strings. No prior authentication, no signature check, no allow-list of legitimate roles.

      A request such as user x role admin logs ... authorises arbitrary ingest including the

      CLARGE28 path-traversal and CLARGE27 format-string primitives.

      '
- id: CLARGE32-SESSION_TOKEN_PREDICTABLE
  title: Session token uses post-incremented next_id twice with FNV of public material
  severity: High
  bug_class: crypto_weakness
  invariant: 'session_create builds material as account colon next_id++ colon time(NULL), digests it with

    FNV1a32, then formats token as S digest next_id using next_id AFTER the post-increment

    in the snprintf above. Both halves are derivable by an attacker who can observe one issued

    token or guess approximate issuance time.

    '
  affected_files:
  - src/auth/session.c
  evidence:
    function: session_create
    lines: 30-44
    snippet: "record = (Session *)calloc(1, sizeof(Session));\nif (record) {\n    snprintf(record->user, sizeof(record->user),\
      \ \"%s\", account);\n    snprintf(material, sizeof(material), \"%s:%u:%ld\", account, registry->next_id++, (long)time(NULL));\n\
      \    digest = fnv1a32(material, strlen(material));\n    snprintf(record->token, sizeof(record->token), \"S%08x%08x\"\
      , digest, registry->next_id);\n"
    why: 'FNV-1a is a non-cryptographic hash and the input components are public (account known,

      next_id sequential, time(NULL) coarse 1-second resolution). The trailing digest part of the

      token is the next sequential id, so once an attacker sees one token they can enumerate

      neighbouring tokens directly; combined with FNV''s lack of secret key the digest can be

      recomputed offline. Strengthens the surface already flagged by CLARGE04 / CLARGE24.

      '
- id: CLARGE33-SESSION_VALIDATE_TAUTOLOGY
  title: session_validate compares the user against the record's own stored user
  severity: High
  bug_class: authorization
  invariant: 'session_validate looks up a session by token, then accepts the request if the supplied

    account string equals record->user. But the only legitimate way to know record->user is to

    already hold the session record, so the user parameter adds no security. Anyone who

    presents a valid token can satisfy the check trivially. The token itself is the entire

    credential, so token theft equals full impersonation with no replay binding.

    '
  affected_files:
  - src/auth/session.c
  evidence:
    function: session_validate
    lines: 66-76
    snippet: "int session_validate(SessionStore *registry, const char *key, const char *account) {\n    Session *record =\
      \ session_find(registry, key);\n    if (record) {\n        if (time(NULL) <= record->expires_at) {\n            if (0\
      \ == strcmp(record->user, account)) {\n                return 1;\n            }\n        }\n    }\n    return 0;\n}\n"
    why: 'The check record->user equals account is meaningless when callers control account. Combined

      with CLARGE32 predictable tokens, this means any stolen or guessed token is fully usable

      because the second parameter is something the attacker can read off the wire or just

      transcribe from the token-bearing request. No HMAC binding, no client nonce, no IP

      pinning, no replay guard.

      '
- id: CLARGE34-WAL_FOPEN_FOLLOWS_SYMLINK
  title: wal_open and file_write_all open by name without O_NOFOLLOW
  severity: High
  bug_class: toctou-symlink
  target_file: src/storage/wal.c
  engine_function: wal_open
  claim: |
    wal_open is the WAL initialisation entry point and calls
    `fopen(filename, "ab")` after snprintf-copying the user-supplied path into
    its own buffer. There is no O_NOFOLLOW, no pre-lstat, no fstat-after-open
    to validate that the resulting file descriptor refers to a regular file
    (S_ISREG) at the expected inode. The same anti-pattern repeats in
    file_write_all (common/fileutil.c) which db_flush calls on store->path.
    A local attacker who controls the parent directory of the WAL or DB path
    can pre-place a symlink at the target name pointing to any file the process
    can write; the next append-mode WAL write or rewrite flush is then
    redirected through the symlink and clobbers the victim. Mitigation: replace
    fopen(..., "ab") with open(path, O_WRONLY|O_APPEND|O_CREAT|O_NOFOLLOW, 0600)
    + fdopen, and fstat-validate S_ISREG before any write.
  evidence:
    function: wal_open and file_write_all and db_flush
    lines: 6-12 (wal.c), 60-77 (fileutil.c), 107-135 (db.c)
    snippet: "int wal_open(Wal *log_handle, const char *filename) {\n    if ((filename) && (log_handle)) {\n        snprintf(log_handle->path,\
      \ sizeof(log_handle->path), \"%s\", filename);\n        log_handle->fp = fopen(filename, \"ab\");\n        return (log_handle->fp\
      \ ? 0 : -1);\n    }\nint file_write_all(const char *path, const void *data, size_t len) {\n    ...\n    stream = fopen(path,\
      \ \"wb\");\n"
    why: 'No O_NOFOLLOW, no fstat-after-open to validate inode, no S_ISREG check before the write.

      Same class as CMED03 in c-medium. Database flush in db_flush goes through this exact path.

      '
- id: CLARGE35-FILE_IS_SAFE_REGULAR_TOCTOU
  title: file_is_safe_regular checks then file_open_checked opens with no inode binding
  severity: Medium
  bug_class: toctou-race
  target_file: src/common/fileutil.c
  engine_function: file_open_checked
  claim: |
    file_open_checked is the public "safe open" helper: it first calls
    file_is_safe_regular(path) which runs `stat(path, &info)` and confirms
    `S_ISREG(info.st_mode)`, and ONLY THEN calls `fopen(path, mode)` on the
    same path string. Between the stat and the fopen the directory entry can
    be swapped (rename, unlink+symlink) by any process with write access to
    the parent directory, so the stat decision does not bind to the inode the
    fopen ultimately receives. Classic TOCTOU: an attacker wins the race by
    replacing the path entry with a symlink to a non-regular target (FIFO,
    device, or another regular file under the attacker's control) after stat
    returns and before fopen runs. Mitigation: open with O_NOFOLLOW first to
    get an fd, then fstat the fd, then S_ISREG-check on the stat result — the
    fd binds to the inode so the check cannot be raced.
  evidence:
    function: file_is_safe_regular and file_open_checked
    lines: 80-107
    snippet: "int file_is_safe_regular(const char *path) {\n    struct stat info;\n    ...\n    if (0 == stat(path, &info))\
      \ {\n    } else {\n        return 0;\n    }\n    if (S_ISREG((info.st_mode))) {\n    } else {\n        return 0;\n \
      \   }\n    return 1;\n}\nFILE *file_open_checked(const char *path, const char *mode) {\n    if (file_is_safe_regular(path))\
      \ {\n        return fopen(path, mode);\n    } else {\n        return NULL;\n    }\n}\n"
    why: 'stat() then fopen() with no fd reuse is the canonical TOCTOU. The check uses the

      world-writable bit (022) on st_mode, but a local attacker can win the race by replacing

      the path entry with a symlink after the stat returns S_ISREG and before fopen runs.

      Mirrors CMED11 style name-only canonicalization.

      '
- id: CLARGE36-FILENAME_TRUNCATION_SUFFIX_LOSS
  title: write_entry snprintf return value ignored so source can drop the .out suffix
  severity: Medium
  bug_class: filesystem_race
  invariant: 'write_entry uses snprintf(filename, 128, "log_%s.out", entry->source). entry->source comes

    from a 64-byte LogLine.source buffer that is unconditionally copied via snprintf in

    logline_parse, but no check rejects entries whose serialised path would be silently

    truncated by snprintf, dropping the .out suffix and letting attackers steer the open

    target into a chosen prefix.

    '
  affected_files:
  - src/program_c.c
  evidence:
    function: write_entry
    lines: 19-26
    snippet: 'snprintf(filename, sizeof(filename), "log_%s.out", entry->source);

      handle = fopen(filename, "ab");

      '
    why: 'snprintf truncation is silently swallowed (return value not checked). The .out suffix

      is therefore not guaranteed, so an attacker who sets source to a precisely sized string

      can produce a filename without the suffix, side-stepping any external tooling that filters

      log_*.out outputs. Combined with CLARGE28 amplifies the path-traversal blast radius.

      '
