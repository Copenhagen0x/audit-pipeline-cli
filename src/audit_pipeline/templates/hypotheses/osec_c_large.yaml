- id: CLARGE10-DB_SYMLINK_FOLLOW
  title: db_flush opens database path via fopen without O_NOFOLLOW
  severity: High
  bug_class: toctou-symlink
  target_file: src/storage/db.c
  engine_function: db_flush
  claim: |
    db_flush serialises the in-memory store to disk by calling
    `fopen(store->path, "wb")` with no `O_NOFOLLOW`, no `O_CREAT|O_EXCL`,
    no pre-`lstat` check, and no post-`fstat` validation of the resulting
    inode. An attacker who controls the parent directory of `store->path`
    (or who can win a rename/symlink-swap race during process startup) can
    pre-place a symlink at the database path pointing to a victim regular
    file; the next db_flush then writes the serialised store payload through
    the symlink and clobbers the victim. Mitigation: open via
    open(path, O_WRONLY|O_CREAT|O_TRUNC|O_NOFOLLOW, 0600) then fdopen, and
    fstat-validate S_ISREG before writing.
  affected_files:
  - src/storage/db.c
  evidence:
    function: db_flush
    lines: 99
    why: 'Symlink can redirect writes to arbitrary files, enabling privilege escalation.

      '
