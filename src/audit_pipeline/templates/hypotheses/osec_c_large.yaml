- id: CLARGE12-QUEUE_LIST_UAF
  title: "Double-free in worker retry path (worker_retry \u2192 worker_run_once)"
  severity: Medium
  bug_class: double-free
  target_file: src/queue/worker.c
  engine_function: worker_run_once
  claim: |
    worker_run_once dequeues a Job via queue_pop, dispatches it, and on failure
    calls `worker_retry(worker, queue, entry)`. When entry->attempts >= 3 the
    retry branch logs "dropping job" and calls `job_free(entry)` itself, then
    returns -1. worker_run_once observes the non-zero return and falls into its
    else branch, which calls `job_free(entry)` a second time on the same pointer.
    A double-free on the libc heap is a memory-safety violation that
    corrupts allocator metadata and is exploitable for arbitrary write on most
    glibc allocators. Mitigation: worker_retry must NOT free on the drop path;
    centralise the free in worker_run_once, or have worker_retry distinguish
    "retry queued" (do not free in caller) from "drop" (caller frees) via a
    distinct return value and set entry to NULL after free.
  affected_files:
  - src/queue/worker.c
  evidence:
    function: worker_run_once
    lines: 29-50
    why: 'worker_retry frees entry on the dropping branch then returns -1; worker_run_once then frees entry a second time in its else branch.

      '
