- id: CLARGE05-TIMING_CHANNEL_STRCMP
  title: Non-constant-time strcmp on session tokens enables timing side-channel
  severity: Medium
  bug_class: timing-channel
  target_file: src/auth/session.c
  engine_function: session_find
  claim: |
    session_find walks the SessionStore linked list and compares the supplied
    `key` against each `entry->token` using libc `strcmp`, which short-circuits
    on the first mismatching byte. The cumulative early-exit gives the comparison
    a data-dependent timing signature: the more leading bytes a guess shares with
    a stored token, the longer the call takes. A remote attacker who can issue
    repeated session_find lookups (e.g. session_validate, session_revoke) and
    measure wall-clock latency can recover a valid token one byte at a time.
    The session token is the entire credential (see CLARGE33 tautology), so a
    timing leak escalates directly to impersonation. All token compare sites
    must use a constant-time helper that XORs every byte regardless of mismatch.
  affected_files:
  - src/auth/session.c
  evidence:
    function: session_find
    lines: 51-64
    why: 'strcmp exits early on mismatch. Valid token takes longer to reject, leaking bytes via timing.

      '
- id: CLARGE06-FNV_HASHDOS
  title: Non-cryptographic FNV hash enables hash-collision DoS in db bucket index
  severity: High
  bug_class: hash-collision-dos
  target_file: src/storage/db.c
  engine_function: db_bucket_index
  claim: |
    db_bucket_index keys storage entries by calling vendor fnv1a32 on each key
    and modding into a small bucket array. FNV-1a is a non-cryptographic hash
    with a fully public, key-less mixing function; an attacker who can submit
    keys (via any ingest path that lands in db_save / db_insert) can pre-compute
    a family of distinct strings that all collide into the same bucket. Inserting
    N such keys forces the bucket linked list to grow to length N and every
    subsequent lookup degrades from O(1) to O(N), giving the attacker an
    asymmetric CPU DoS. Mitigation: replace FNV-1a with a keyed hash
    (SipHash-2-4 with a per-process random seed) so the bucket layout is
    unpredictable.
  affected_files:
  - src/vendor/fnvhash/fnvhash.c
  - src/auth/session.c
  - src/storage/db.c
  evidence:
    function: fnv1a32, db_bucket_index
    lines: 40, 10
    why: 'FNV not collision-resistant. Attacker crafts keys with same hash, causing HashDoS.

      '
- id: CLARGE07-WILDCARD_AUTHZ
  title: ACL wildcard match grants overly broad access
  severity: High
  bug_class: authorization-bypass
  target_file: src/auth/acl.c
  engine_function: acl_check
  claim: |
    acl_check iterates over loaded AclRule entries and accepts the request when
    (entry->user == name || entry->user == "*") AND
    (entry->resource == target || entry->resource == "*") AND
    bits == (entry->mask & bits). The wildcard branch is OR'd into both axes
    with no separate guard or default-deny, so any rule with user "*" on a
    sensitive resource grants that resource to every caller, and any rule with
    resource "*" grants every operation to a specific user. acl_load accepts
    such rules from arbitrary input. Mitigation: require explicit principals
    for sensitive resources, or split wildcard matching into a separately
    audited code path that logs each grant.
  affected_files:
  - src/auth/acl.c
  evidence:
    function: acl_check
    lines: 24-26
    why: 'Logic allows (*, specific_resource) rules to match any user.

      '
