# OtterSec evaluation — C / c-large hypothesis library.
# 36 hyps authored; manual verification kept 11 publishable findings.

hypotheses:
- id: CLARGE01-PARSER_OOB_READ
  title: Off-by-one stack OOB write in parser_handle_control (1 byte past action[32])
  severity: High
  bug_class: stack-buffer-overflow
  target_file: src/protocol/parser.c
  engine_function: parser_handle_control
  claim: |
    parser_handle_control reads frame payload bytes into a fixed-size stack buffer
    `action[32]` using a loop whose bound uses `offset <= payload_len` instead of
    `offset < payload_len`. When payload_len equals 32 the loop performs one extra
    iteration and writes one byte past the end of the action buffer on the stack.
    Direct off-by-one violating the action[32] bound at protocol/parser.c:18-20.
  affected_files:
  - src/protocol/parser.c
  evidence:
    function: parser_handle_control
    lines: 18-20
    why: 'Off-by-one: offset <= payload_len should be offset < payload_len. Reads past buffer boundary.

      '
