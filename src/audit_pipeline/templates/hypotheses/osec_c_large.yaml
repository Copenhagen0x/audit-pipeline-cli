- id: CLARGE18-RECORD_CODEC_DIVERGENCE
  title: Record encode and decode round-trip is not bit-exact, silently corrupts payload
  severity: Medium
  bug_class: save-load-divergence
  target_file: src/storage/record.c
  engine_function: record_encode
  claim: |
    record_encode in storage/record.c emits a Record into a Buffer via a sequence
    of length-prefixed field writes, and record_decode parses the same bytes back
    into a Record struct. The encode and decode paths use different field
    bounds and orderings for the optional fields, so a Record carrying a value
    that contains the field delimiter byte (or whose length straddles an internal
    boundary) round-trips into a DIFFERENT Record. db_load consumes the decoded
    Record, so any disagreement between encode and decode causes silent data
    corruption: the value persisted on disk is not what was queried back on the
    next process start. Mitigation: tighten both paths to a single shared
    declarative schema (TLV with explicit length prefixes for every field),
    fuzz the round-trip with random Record inputs until encode(decode(x))==x
    holds for the full Record space, and reject malformed encodings on decode.
  affected_files:
  - src/storage/record.c
  evidence:
    function: record_encode, record_decode
    lines: 51-130
    why: 'Serialization divergence breaks round-trip fidelity.

      '
