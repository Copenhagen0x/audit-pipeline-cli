  - id: P14-authority-transfer-requires-both-signers
    class: authorization
    severity: Medium
    bug_class: admin-handover-single-step
    claim: >
      `UpdateAuthority` (non-burn case) requires BOTH the current
      authority of the chosen kind (signer check at line 5732) AND the
      new authority pubkey (signer check at line 5732-5734) to sign in
      the same transaction. A single-signer hand-over (only the current
