# Percolator hypothesis library â€” ported from non-perp class libraries.
#
# This file ports UNIVERSALLY-APPLICABLE security patterns from
# amm_cp_class.yaml, clmm_class.yaml, lending_class.yaml, lst_class.yaml,
# and the non-Percolator parts of perp_dex_class.yaml.
#
# Many of the patterns those libraries encode (oracle confidence-interval
# bypass, PDA bump malleability, account-discriminator / state-version
# checks, token-program substitution, admin-handover races, account-close
# state leaks, donation-style attacks, share/round-trip rounding direction)
# are not AMM-specific or lending-specific â€” they apply to ANY Solana
# program holding user funds. They had simply never been ported to the
# Percolator-tagged set.
#
# ID convention: `P<n>-<short-slug>` ("P" for ported).
# Each entry cites its source pattern in `source_hyp`.
#
# Patterns explicitly NOT ported (and why):
#   - AMM K-invariant (no x*y=k curve in Percolator)
#   - CLMM tick math, fee-growth, position NFTs (no concentrated-liquidity)
#   - Lending borrow rate / utilization / cToken / e-mode (no borrowing)
#   - LST exchange-rate / validator-set / withdraw-queue (no LST mechanic)
#   - Saber stableswap / Newton iteration (no stableswap)
#   - JLP vault share NAV (no LP-pool-backed perp model in Percolator)

