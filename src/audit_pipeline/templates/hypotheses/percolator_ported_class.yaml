  - id: P6-slab-magic-discriminator
    class: authorization
    severity: High
    bug_class: account-discriminator-bypass
    claim: >
      Every mutating Percolator handler that operates on a slab account
      calls `slab_guard` + `require_initialized`, which validates
      `SlabHeader::magic == 0x504552434f4c4154` before any unsafe cast
      to `RiskEngine`. No path lets the caller pass a wrong-type
      account (e.g. an Anchor account from a different program, a token
      account, or a stale System account) and have the program operate
      on it as if it were an initialized slab.
    applies_to: [percolator]
    scope_conditions: []
    target_file: src/percolator.rs
    relevant_instructions: |
      require_initialized (line 5320), slab_guard, all 30+ instruction
      handlers
    source_hyp: lending_class.yaml#LEND209-cpi-account-discriminator, clmm_class.yaml#CLMM155-account-discriminator-validated, perp_dex_class.yaml#PD36-account-discriminator-validated

