  - id: P1-oracle-confidence-interval-respected
    class: authorization
    severity: High
    bug_class: oracle-confidence-bypass
    claim: >
      Every Percolator oracle read used for a risk decision rejects a Pyth
      observation whose confidence band exceeds the configured per-leg
      confidence floor (see `MAX_CONF_FILTER_BPS` and `oracle_leg_config_ok`).
      No fallback path inside `read_pyth_price_e6`, `read_chainlink_price_e6`,
      `read_raw_oracle_price_e6`, or `read_engine_price_e6` lets a wide-
      confidence price drive a state mutation, regardless of whether
      `last_oracle_price > 0` (fast path) or `last_oracle_price == 0`
      (cold path).
    applies_to: [percolator]
    scope_conditions: [uses_pyth_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      TradeCpi, TradeNoCpi, KeeperCrank, CatchupAccrue, DepositCollateral,
      WithdrawCollateral, ResolvePermissionless, ResolveMarket
    source_hyp: lending_class.yaml#LEND131-oracle-confidence-respected, perp_dex_class.yaml#PD16-oracle-confidence-respected

  - id: P2-oracle-account-binding
    class: authorization
    severity: High
    bug_class: oracle-substitution
    claim: >
      Each oracle account passed to a Percolator instruction is validated
      against the per-leg `feed_id` recorded in `MarketConfig`
      (`oracle_leg_feed_id`). A spoofed Pyth/Chainlink account, or an
      account that decodes successfully but whose feed-id does not match
      what InitMarket bound, is rejected before any price is consumed.
      Substitution attempts cannot route the engine's oracle read through
      attacker-controlled feed data.
    applies_to: [percolator]
    scope_conditions: [uses_pyth_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      read_pyth_price_e6, read_chainlink_price_e6, read_external_price_e6,
      oracle_leg_config_ok
    source_hyp: lending_class.yaml#LEND132-oracle-mint-binding

  - id: P3-oracle-publish-time-monotone
    class: invariant_property
    severity: High
    bug_class: oracle-monotonicity-violation
    claim: >
      Per-leg `last_oracle_publish_time` and `oracle_target_publish_time`
      on the slab can only advance forward in slot/timestamp space. No
      code path lets a second oracle read with a `publish_time` earlier
      than the stored one overwrite the recorded timestamp. This guards
      against oracle-replay attacks where an attacker-supplied stale
      publish-time would lower an existing freshness baseline.
    applies_to: [percolator]
    scope_conditions: [uses_pyth_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      read_engine_price_e6, KeeperCrank, TradeCpi, CatchupAccrue,
      ResolvePermissionless
    source_hyp: lending_class.yaml#LEND134-oracle-update-monotone-clock, clmm_class.yaml#CLMM85-reward-rate-monotone-clock

  - id: P4-oracle-twap-fallback-no-silent
    class: state_transition
    severity: Medium
    bug_class: oracle-silent-fallback
    claim: >
      When Percolator's primary oracle read fails (stale, low confidence,
      decode error), the engine does not silently fall back to a cached
      `last_oracle_price` or `mark_ewma_e6` for risk decisions. Either
      the instruction reverts, or the cached read is gated by an explicit
      policy (e.g. ResolvePermissionless freezes new mutations).
    applies_to: [percolator]
    scope_conditions: [uses_pyth_oracle]
    target_file: src/percolator.rs
    relevant_instructions: |
      read_engine_price_e6, get_engine_oracle_price_e6,
      no_oracle_fee_sync_anchor
    source_hyp: lending_class.yaml#LEND133-oracle-twap-fallback, perp_dex_class.yaml#PD17-oracle-twap-fallback-explicit

