  - id: P15-scoped-authority-disjoint
    class: authorization
    severity: High
    bug_class: pause-authority-confusion
    claim: >
      The four authority kinds (`AUTHORITY_ADMIN`, `AUTHORITY_HYPERP_MARK`,
      `AUTHORITY_INSURANCE`, `AUTHORITY_INSURANCE_OPERATOR`) are
      structurally disjoint: each gate (`require_admin(header.admin)`,
      `require_admin(header.insurance_authority)`, etc.) checks against
      a distinct stored field, so holding one authority does not unlock
      the others. In particular, `AUTHORITY_INSURANCE_OPERATOR` cannot
      reach `WithdrawInsurance` (tag 20 / unbounded) â€” only `WithdrawInsuranceLimited`.
    applies_to: [percolator]
    scope_conditions: [has_insurance_pool]
    target_file: src/percolator.rs
    relevant_instructions: |
