# OtterSec evaluation — Solana/Anchor language hypothesis library.
#
# Designed for the sahuang-osec/solana-{small,medium,large} synthetic-bug
# repos. Covers Solana-specific bug classes (Anchor account validation
# footguns, PDA seed manipulation, AccountInfo-vs-Signer confusion,
# missing has_one, CPI mis-signing) plus universal patterns (integer
# overflow, oracle staleness, access-control bypass, reentrancy).
#
# Each hypothesis is a binary "is this invariant violated?" question.
# L2 PoC uses `cargo test-bpf` / `solana-program-test` with bug-witness
# inverted assertions. L3 uses Kani harnesses. L4 uses LiteSVM exploit
# chains.
#
# Run with:
#   audit-pipeline hunt \
#     --hypotheses .../osec_solana_class.yaml \
#     --language solana \
#     --refinement-rounds 1 \
#     --max-concurrent 4
#
# Solana/Anchor-specific notes:
#   * Anchor's #[derive(Accounts)] auto-validates SOME constraints but
#     ONLY when the right types/macros are used. `AccountInfo` skips
#     ALL checks; `Signer` requires a signature; `Account<'info, T>`
#     deserializes + checks discriminator; `has_one = X` checks struct
#     field equality with the named context account.
#   * PDAs need both `seeds = [...]` AND `bump` to validate canonical.
#   * `invoke_signed` requires the program-derived signer seeds to
#     match the calling program's PDA — mis-seeding breaks the sig.
#   * Clock::get() returns current sysvar; checks like elapsed/
#     timestamp depend on it.

hypotheses:

  # ─────────────────── Anchor account validation ───────────────────

  - id: SOL1-account-info-instead-of-signer
    class: authorization
    severity: Critical
    bug_class: missing-signer-check
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every privileged account in an instruction's accounts struct that
      represents the authorized caller (admin, owner, authority) is
      declared as `Signer<'info>`, NOT `AccountInfo<'info>` or
      `UncheckedAccount<'info>`. Using `AccountInfo` skips the
      signature check, so an attacker passes the privileged pubkey
      without actually possessing the key.
    relevant_instructions: |
      withdraw, rotate_admin, set_authority, transfer_admin,
      emergency_drain, pause/unpause, close

  - id: SOL2-missing-has-one
    class: authorization
    severity: Critical
    bug_class: missing-account-binding
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every `Account<'info, T>` in an instruction whose body trusts a
      field like `stake.user` or `position.owner` to match a signer in
      the same context has either a `has_one = <signer_name>` constraint
      OR explicit equality check in the body. Without it, an attacker
      passes another user's account and operates on it under their own
      signature.
    relevant_instructions: |
      claim_rewards, withdraw_stake, close_position, update_user

  - id: SOL3-missing-seeds-bump
    class: account-validation
    severity: High
    bug_class: pda-not-canonical
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every `Account<'info, T>` that should be a PDA has the matching
      `seeds = [...]` and `bump = stored_bump` constraints. Missing
      seeds lets the attacker pass an account at any address; missing
      bump validation lets them use a non-canonical bump (256 distinct
      addresses for the same logical PDA).
    relevant_instructions: |
      any PDA-derived account: config, vault, stake, position

  - id: SOL4-unchecked-account-ownership
    class: account-validation
    severity: High
    bug_class: missing-program-ownership
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every `AccountInfo<'info>` field whose data is read or which
      receives lamports either declares `owner = some_program_id` OR
      explicitly checks `account.owner == &expected_program_id` in the
      body. Without it, attacker passes a malicious-program-owned
      account and the program reads attacker-controlled data.
    relevant_instructions: |
      transfer, parse account data, CPI to other programs

  - id: SOL5-account-discriminator-skipped
    class: account-validation
    severity: High
    bug_class: type-confusion
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every account read as a specific type uses `Account<'info, T>` or
      explicit `T::try_from_slice` (not `AccountInfo` + manual offset
      reads). The 8-byte discriminator prefix prevents type confusion;
      bypassing it lets an attacker pass an account with the WRONG
      type but matching size, where field offsets line up to a
      privileged value.
    relevant_instructions: |
      privileged config reads, admin lookups, struct deserialization

  # ─────────────────── Authorization gates ───────────────────

  - id: SOL6-admin-check-from-instruction-data
    class: authorization
    severity: Critical
    bug_class: auth-from-untrusted-source
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every admin/authority comparison reads the expected pubkey from
      on-chain state (e.g. `config.admin`), NOT from instruction data
      or `AccountInfo.key()` of a caller-provided account. Reading the
      expected admin from a caller-supplied account makes the check
      tautological.
    relevant_instructions: |
      assert_admin, require!, == comparisons in admin paths

  - id: SOL7-permissionless-privileged-fn
    class: authorization
    severity: Critical
    bug_class: missing-access-control
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every privileged operation (withdraw to admin, rotate admin,
      pause, update parameters, emergency drain) has an explicit
      signer-equals-stored-authority check at the top of the function
      body. Functions that mutate privileged state without any auth
      gate are universally exploitable.
    relevant_instructions: |
      withdraw, rotate_admin, set_params, pause, drain, close_vault

  - id: SOL8-equality-not-strict
    class: authorization
    severity: High
    bug_class: weak-equality
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every admin/authority equality check uses `==` on `Pubkey`, not
      partial fields or string-converted comparison. Anchor's `Pubkey`
      is 32 bytes; mixing it with `&[u8]` slices or comparing only
      a prefix lets attackers craft collision pubkeys.
    relevant_instructions: |
      admin equality checks, Pubkey::from_str, partial slice cmp

  # ─────────────────── PDA / signer-seeds ───────────────────

  - id: SOL9-invoke-signed-wrong-seeds
    class: cpi-correctness
    severity: Critical
    bug_class: pda-signer-mismatch
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every `invoke_signed` call passes seeds that exactly match the
      PDA being acted on (program ID + same seed bytes used at
      derivation). Mis-seeded `invoke_signed` either fails the CPI or
      (worse) signs as a DIFFERENT PDA than expected.
    relevant_instructions: |
      invoke_signed, system_instruction::transfer, token::transfer

  - id: SOL10-cpi-using-invoke-not-invoke-signed
    class: cpi-correctness
    severity: Critical
    bug_class: missing-pda-sign
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every CPI that requires a PDA's signature uses `invoke_signed`,
      NOT `invoke`. `invoke` succeeds only if the source account has a
      user signature; calling `invoke` with a PDA source silently
      fails (or worse, succeeds if the user happened to sign).
    relevant_instructions: |
      transfer from PDA vault, mint authority CPI, close account

  - id: SOL11-pda-seeds-attacker-controlled
    class: pda-derivation
    severity: High
    bug_class: predictable-pda
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every PDA used to gate privileged state derives its seeds from
      stable on-chain identifiers (program ID, fixed string,
      stored pubkey), NOT from instruction data that the attacker
      controls. Attacker-controlled seeds let the attacker derive
      arbitrary PDAs and impersonate them.
    relevant_instructions: |
      Pubkey::find_program_address, init seeds with ix data

  # ─────────────────── Arithmetic ───────────────────

  - id: SOL12-u64-overflow-arith
    class: arithmetic
    severity: High
    bug_class: integer-overflow
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every arithmetic op on a u64 balance / counter that COULD overflow
      uses `checked_add` / `checked_mul` / `checked_sub` or a wider
      type. Raw `a + b` panics on overflow (DoS) but more importantly,
      attackers can construct inputs that cause silent wraparound when
      `wrapping_*` is used.
    relevant_instructions: |
      total_deposits +=, reward_rate * elapsed, balance arithmetic

  - id: SOL13-saturating-sub-on-security
    class: arithmetic
    severity: High
    bug_class: saturating-loses-signal
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every subtraction on a security-relevant balance (vault total,
      user balance, locked stake) uses `checked_sub` to fail loudly
      on underflow, NOT `saturating_sub` which silently caps at 0.
      Saturating-on-underflow masks accounting bugs and lets
      attackers withdraw more than they deposited.
    relevant_instructions: |
      total_deposits -= amount, stake.amount -= unstake_amount

  - id: SOL14-divide-by-zero
    class: arithmetic
    severity: Medium
    bug_class: divide-by-zero
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every division `a / b` where `b` is derived from input or
      mutable state checks `b != 0` first. Division by zero is a
      panic (DoS); also `a / b * c` ordering causes precision loss.
    relevant_instructions: |
      share / total_supply, payout / total_staked, fee math

  - id: SOL15-cast-truncation
    class: arithmetic
    severity: Medium
    bug_class: cast-truncation
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every narrowing cast (u128 -> u64, u64 -> u32, i64 -> i32) checks
      bounds before casting. Rust's `as` is silent truncation; large
      values silently lose high bits.
    relevant_instructions: |
      Clock::get().unix_timestamp as u64, u128 result as u64

  - id: SOL16-rounding-direction
    class: arithmetic
    severity: Medium
    bug_class: rounding-favors-user
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every share-vault function rounds in the protocol's favor: mint
      rounds DOWN on shares minted (user pays more, gets less); burn
      rounds DOWN on assets returned (user gets less back). Default
      integer division rounds toward zero — fine for protocol-favor
      paths, harmful when applied to user-favor paths.
    relevant_instructions: |
      shares = (deposit * total_shares) / total_assets,
      assets = (shares * total_assets) / total_shares

  # ─────────────────── State-machine / lifecycle ───────────────────

  - id: SOL17-reinit-attack
    class: lifecycle
    severity: Critical
    bug_class: missing-close-attribute
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every account that is destroyed (lamports drained, intended to
      be closed) uses Anchor's `close = receiver` attribute (which
      sets the account discriminator to CLOSED_ACCOUNT_DISCRIMINATOR
      and prevents re-init in the same tx). Manual lamport drain
      without `close` lets an attacker re-initialize the account in
      the same tx with attacker-controlled state.
    relevant_instructions: |
      close_account, claim_and_close, withdraw_to_owner

  - id: SOL18-initialize-twice
    class: lifecycle
    severity: High
    bug_class: missing-init-guard
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every initialize function uses Anchor's `init` constraint (which
      fails if the account already exists) OR checks `!exists(account)`
      manually. Initialize-twice lets an attacker overwrite the
      stored admin pubkey.
    relevant_instructions: |
      initialize, init_pool, setup_authority

  - id: SOL19-double-claim
    class: lifecycle
    severity: High
    bug_class: missing-claim-marker
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every reward / payout claim records a marker (last_claim_ts +=,
      claimed[id] = true, paid_out += amount) BEFORE the transfer CPI
      so re-entry can't double-claim. State-after-CPI patterns are
      reentrancy-vulnerable; even on Solana (which prevents same-
      program reentry), state-after-CPI is fragile under partial
      execution.
    relevant_instructions: |
      claim_rewards, harvest, withdraw_yield

  - id: SOL20-replay-allowed
    class: lifecycle
    severity: High
    bug_class: missing-nonce
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every action that should be one-shot (one-time settle, one-time
      execute) marks its done-flag (`completed = true`,
      `state == Executed`) AND checks the flag at entry. Missing
      check lets the attacker re-execute and double-spend.
    relevant_instructions: |
      escrow.cancel, escrow.take, proposal.execute, vesting.claim

  # ─────────────────── Token-economics & math ───────────────────

  - id: SOL21-fee-unbounded
    class: token-economics
    severity: Medium
    bug_class: fee-bound-missing
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every fee setter (initialize / set_fee / update_fee) clamps the
      new fee to a sane upper bound (e.g. < 10000 bps = 100%).
      Otherwise admin or attacker can set fee == u64::MAX, causing
      overflow on the first trade.
    relevant_instructions: |
      initialize(.., fee), set_fee_bps, update_fee_rate

  - id: SOL22-share-inflation-first-depositor
    class: token-economics
    severity: High
    bug_class: share-inflation
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every share-mint vault handles the first-depositor edge case:
      either virtual shares (constant offset minted to dead address)
      or a min-deposit floor. Without it, the first depositor mints 1
      share, transfers a large amount to the vault directly, then
      subsequent depositors get rounded to 0 shares.
    relevant_instructions: |
      mint_shares, deposit_for_shares, share calculation

  - id: SOL23-slippage-missing
    class: token-economics
    severity: Medium
    bug_class: missing-slippage
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every swap / redeem function accepts a min-out parameter and
      enforces `actual_out >= min_out`. Otherwise MEV bots
      arbitrage every swap by sandwiching with their own swaps.
    relevant_instructions: |
      swap_exact_in, redeem_shares, claim_rewards

  - id: SOL24-deadline-missing
    class: token-economics
    severity: Low
    bug_class: missing-deadline
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every off-chain-signed action (relayed tx, permit) has a
      deadline timestamp and rejects past-deadline submissions.
      Without one, MEV bots can hold a signed transaction and
      submit it at a market price favorable to them.
    relevant_instructions: |
      permit, relay_tx, signed_swap

  - id: SOL25-stake-pre-deposit-accrual
    class: token-economics
    severity: Medium
    bug_class: reward-time-window
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every stake-and-claim flow accrues rewards from the DEPOSIT
      time, not from the open-stake time. If `last_claim_ts` is set
      at open_stake (when amount = 0), then a later deposit accrues
      rewards over the entire elapsed period as if the deposit
      existed from open_stake.
    relevant_instructions: |
      open_stake, deposit_stake, claim_rewards math

  # ─────────────────── Oracle / time / clock ───────────────────

  - id: SOL26-oracle-staleness
    class: oracle
    severity: Medium
    bug_class: oracle-staleness
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every oracle price read checks the `updated_at` timestamp is
      within a max-staleness window. Stale prices during outages let
      attackers borrow against stale collateral.
    relevant_instructions: |
      pyth::get_price, oracle.last_update_slot, switchboard reads

  - id: SOL27-oracle-zero-price
    class: oracle
    severity: Low
    bug_class: oracle-zero
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every oracle price read rejects zero (or negative) prices. Zero
      is a sentinel for "feed unavailable" — silently accepting it
      means free borrows / infinite collateral value.
    relevant_instructions: |
      price comparison, ratio calculations, liquidation checks

  - id: SOL28-clock-not-monotonic
    class: oracle
    severity: Low
    bug_class: clock-decrease
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every time-elapsed calculation handles the case where the
      current clock is LESS than the stored timestamp (clock drift,
      sysvar replay). Naive `current - stored` underflows.
    relevant_instructions: |
      Clock::get().unix_timestamp - last_claim_ts

  # ─────────────────── Closing / cleanup ───────────────────

  - id: SOL29-close-without-zeroing
    class: lifecycle
    severity: High
    bug_class: revival-via-realloc
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every account close (manual or `close = receiver`) sets
      data[0..8] to CLOSED_ACCOUNT_DISCRIMINATOR before draining
      lamports. Otherwise an attacker can fund the account back
      to rent-exemption and re-use the old data.
    relevant_instructions: |
      close, manual lamport drain, account realloc

  - id: SOL30-mut-on-immutable-account
    class: account-validation
    severity: Medium
    bug_class: mut-flag-wrong
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every account that gets written to (state mutation, lamport
      transfer) is marked `mut` in the Accounts struct. Anchor
      will refuse the tx if `mut` is missing and the program tries
      to mutate. A subtle bug: `mut` missing on the destination of
      a transfer.
    relevant_instructions: |
      #[account(mut)] on transfer destinations, state updates

  # ─────────────────── Sysvar / clock / rent ───────────────────

  - id: SOL31-rent-not-paid
    class: lifecycle
    severity: Medium
    bug_class: rent-exempt-missing
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every newly-created account is funded to rent-exemption (via
      `init` constraint or manual transfer). Otherwise the account
      can be garbage-collected mid-protocol-flow.
    relevant_instructions: |
      init constraint, manual create_account, lamport math

  # ─────────────────── State integrity ───────────────────

  - id: SOL32-bump-not-stored
    class: pda-derivation
    severity: Medium
    bug_class: bump-not-canonical
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every PDA's canonical bump is stored on the account at init and
      referenced via `bump = stored.bump` in subsequent instruction
      accounts. Recomputing via `bump` (no `= value`) on each call
      lets non-canonical bumps pass validation.
    relevant_instructions: |
      bump in #[account(...)], bump field on struct

  - id: SOL33-empty-if-branch
    class: logic
    severity: Low
    bug_class: empty-if-branch
    engine_function: ""
    target_file: programs/*/src/lib.rs
    claim: >
      Every `if condition { } else { ... }` pattern verifies the
      semantics — the empty `if` branch is suspicious. If the
      condition is "is admin" and the empty branch is the admin path,
      the logic is inverted.
    relevant_instructions: |
      if X == Y { } else { abort }, inverted access control

  # ─────────────────── Specific to small / vault / escrow / staking ───────────────────

  - id: SOL34-vault-withdraw-no-signer
    class: authorization
    severity: Critical
    bug_class: missing-signer-check
    engine_function: ""
    target_file: programs/vault/src/lib.rs
    claim: >
      vault::withdraw declares the admin account as `Signer<'info>`
      (NOT `AccountInfo<'info>`), so a non-admin caller cannot pass
      the admin pubkey and bypass the signature requirement. Anyone
      who can construct an AccountInfo with the admin's pubkey
      drains the vault.
    relevant_instructions: |
      vault::withdraw, Withdraw struct, admin field type

  - id: SOL35-escrow-cancel-maker-not-validated
    class: authorization
    severity: Critical
    bug_class: missing-account-binding
    engine_function: ""
    target_file: programs/escrow/src/lib.rs
    claim: >
      escrow::cancel verifies `ctx.accounts.maker.key() == escrow.maker`
      OR declares `maker: Signer<'info>` with `has_one = maker` on
      the escrow. Otherwise any caller passes their own pubkey as
      `maker` and the vault PDA signs the transfer to the attacker.
    relevant_instructions: |
      escrow::cancel, Cancel struct, maker field type + has_one

  - id: SOL36-staking-claim-stake-not-bound
    class: authorization
    severity: Critical
    bug_class: missing-account-binding
    engine_function: ""
    target_file: programs/staking/src/lib.rs
    claim: >
      staking::claim's `stake: Account<'info, StakeAccount>` has
      either `seeds = [b"stake", user.key().as_ref()]` OR
      `has_one = user` to bind it to the signing user. Without that
      constraint an attacker passes ANY user's stake account and
      claims their rewards into their own user account.
    relevant_instructions: |
      staking::claim, Claim struct, stake field constraints

  # ─────────────────── Medium-codebase patterns (added 2026-05-15) ───────────────────
  # SOL37-SOL42 — surfaced during manual review of sahuang-osec/solana-medium
  # (6 programs · 1864 LOC · vault_router/oracle_board/governance_hub/
  # credit_market/settlement_bridge/rewards_pool). Existing SOL1-SOL36
  # catch ~20 of ~26 critical-grade bugs in that codebase; the 6 below
  # close the gap.

  - id: SOL37-oracle-bypass-user-supplied-price
    class: oracle
    severity: Critical
    bug_class: oracle-bypass
    engine_function: ""
    target_file: ""
    claim: >
      No `pub fn` that mutates a borrowable/seizable balance accepts a
      `price`/`rate`/`reported_price`/`collateral_price` as a u64/i64
      INSTRUCTION PARAMETER when its config struct holds a
      `price_feed`/`oracle`/`oracle_board` pubkey. The function must
      either read the on-chain oracle account OR be admin-gated.
      Credit-market `deposit_collateral(units, reported_price)` and
      `liquidate(repay_amount, collateral_price)` are the canonical
      failures: borrower/liquidator picks the price and the listing's
      `price_feed: UncheckedAccount` is never read.
    relevant_instructions: |
      Any fn whose signature includes `price`/`rate`/`reported_*` u64 and
      whose accounts struct contains a `price_feed`/`oracle*` field

  - id: SOL38-phantom-balance-no-cpi-transfer
    class: token-economics
    severity: Critical
    bug_class: missing-cpi-transfer
    engine_function: ""
    target_file: ""
    claim: >
      Every fn that mutates `total_cash`/`total_deposits`/`balance`/
      `cash_units`/`treasury.balance` ALSO emits a corresponding
      `anchor_spl::token::transfer` (or `system_program::transfer`)
      CPI. Without the CPI the on-chain accounting is fictional —
      `supply_cash(amount)`, `repay(amount)`, `seize_reserves(amount)`,
      `deposit_treasury(amount)` all currently do `state.balance +=
      amount` with no token movement, letting any caller inflate the
      pool's notional cash to u64::MAX and drain real downstream funds.
    relevant_instructions: |
      Any fn that mutates a balance/cash counter on a #[account] struct
      without a `transfer`/`invoke_signed` call in the same fn body

  - id: SOL39-time-lock-set-never-checked
    class: state-machine
    severity: High
    bug_class: time-lock-bypass
    engine_function: ""
    target_file: ""
    claim: >
      Whenever a struct field named `unlock_slot`/`unlock_ts`/
      `vesting_end`/`finality_delay`/`lockup_until` is WRITTEN by one
      fn, AT LEAST ONE downstream fn (`unstake`/`withdraw`/`execute`/
      `claim`) reads it and compares against `Clock::get()?.slot`/
      `unix_timestamp`. `rewards_pool::stake` sets
      `position.unlock_slot = lock_slots + slot` but `unstake` never
      reads it — the lock period is dead code.
    relevant_instructions: |
      grep for assignment to `*unlock*`/`*finality*`/`*lockup*`/
      `*vesting*` field; matching fn must compare it against Clock

  - id: SOL40-inverted-bounds-comparator
    class: arithmetic
    severity: High
    bug_class: inverted-comparator
    engine_function: ""
    target_file: ""
    claim: >
      Every `require!(BOUND <op> x, BadConfig)` and every
      `if BOUND <op> x { return err!(...) }` uses the comparator that
      matches the intent in the error name. `require!(10_000 <=
      max_multiplier_bps, BadConfig)` accepts ONLY values >= 10_000 (so
      `max_multiplier_bps` is effectively unbounded above 100%); the
      author wanted to REJECT values above 10_000 (`<= 10_000`).
      Similar: `if 216_000 >= elapsed { return Ok }` skips the daily
      reset at EXACTLY 216_000 slots — off-by-one with the same shape.
    relevant_instructions: |
      `require!(<lit> <op> <var>, *BadConfig*)` and `if <lit> <op>
      <var> { return [err|Ok] }` — check the operator agrees with the
      error message direction

  - id: SOL41-attestation-decoupled-from-execution
    class: cross-program
    severity: Critical
    bug_class: attestation-decoupled
    engine_function: ""
    target_file: ""
    claim: >
      If an `attest_*`/`verify_*`/`approve_*` fn initializes an
      Attestation/Approval/Verification account, every gating fn
      (`execute_*`/`receive_*`/`redeem_*`/`finalize_*`) requires that
      account as input AND reads its signature_count/signer_count >=
      threshold. `settlement_bridge::execute_message` and
      `receive_message` accept neither an `attestation` account nor a
      threshold check — anyone calls execute_message after the bare
      finality_delay regardless of whether attestation ever happened.
    relevant_instructions: |
      Find `#[account] pub struct *Attestation` or fn `attest_*`; then
      check every fn whose name starts with `execute_`/`receive_`/
      `redeem_` requires that account + reads signature_count

  - id: SOL42-deviation-bound-stored-never-enforced
    class: oracle
    severity: High
    bug_class: bound-not-enforced
    engine_function: ""
    target_file: ""
    claim: >
      Every struct field named `max_deviation_*`/`max_outflow`/
      `weight_bps`/`max_slippage_*`/`cap` is READ by the update fn that
      could violate it. `oracle_board::publish(answer)` stores
      `publisher.max_deviation_bps` (validated < 10_000 at registration)
      but the publish path never compares the new answer against the
      previous `feed.last_answer` — bound is decorative. Same pattern:
      `vault_router::route.weight_bps` stored but rebalance amount
      ignores it.
    relevant_instructions: |
      Any `#[account] pub struct` field `max_*_bps`/`*_cap`/`*_limit`
      grep for reads of that field in the matching update fn; absence
      means the bound is unenforced


  - id: SOL43-aggregate-input-range-bypass
    class: oracle
    severity: High
    bug_class: oracle-bypass
    engine_function: ""
    target_file: programs/oracle_board/src/lib.rs
    claim: >
      oracle_board::aggregate validates the AVERAGE of (answer_a, answer_b,
      answer_c) against feed.min_answer..max_answer but does NOT range-check
      each individual input. An input triple of (-1_000_000, 0, +1_000_000)
      averages to 0 and passes the bounds check if min_answer is <= 0; the
      aggregated last_answer ends up at 0 even on a properly configured
      feed. Each individual input must also satisfy min_answer <= input <=
      max_answer before averaging.
    relevant_instructions: |
      oracle_board::aggregate, lines 80-93

  - id: SOL44-rebalance-arbitrary-share-price-deflation
    class: token-economics
    severity: High
    bug_class: share-price-manipulation
    engine_function: ""
    target_file: programs/vault_router/src/lib.rs
    claim: >
      vault_router::rebalance reduces source_vault.total_deposits without
      touching source_vault.total_shares (lines 133, 136), which deflates
      the share price (total_deposits / total_shares) by an arbitrary amount
      bounded only by route.max_outflow. Subsequent withdrawers receive
      shares * deflated_price and lose principal relative to deposit.
      Rebalance is permissioned (operator: Signer) but no economic guard
      preserves the source vault's share-price invariant.
    relevant_instructions: |
      vault_router::rebalance, lines 114-138

  # ─────────────────── Large-codebase patterns (added 2026-05-17) ───────────────────
  # SOL45-SOL64 — surfaced during manual review of sahuang-osec/solana-large
  # (10 programs · 5,257 LOC · bridge_mailbox + dao_treasury + lending_pool +
  # margin_house + nft_escrow + oracle_board + payment_stream + rewards_farm +
  # stake_router + vault_market). SOL1-SOL44 catch the universal Solana / Anchor
  # bug-classes; the 20 below close the gap on patterns specific to the
  # cross-chain, governance, lending, margin, vault, oracle, and NFT-marketplace
  # surface areas that the small / medium repos didn't exercise.

  - id: SOL45-cross-domain-nonce-replay
    class: state-machine
    severity: Critical
    bug_class: cross-domain-replay
    engine_function: ""
    target_file: programs/bridge_mailbox/src/lib.rs
    claim: >
      Cross-chain mailbox MUST track the last delivered nonce per
      `(remote_domain, message_type)` tuple, not per-peer. The deliver
      handler checks `peer.last_nonce <= nonce` against a Peer keyed on
      `(mailbox, remote_domain)` only — an attacker controlling two
      registered peers can replay a message from domain A by submitting
      the same payload through domain B's peer record, because the nonce
      counter is scoped to the wrong PDA key. Cross-domain replay corrupts
      delivery-record state.
    relevant_instructions: |
      bridge_mailbox::deliver, instructions/mod.rs Deliver handler

  - id: SOL46-wrapping-arith-on-security-counter
    class: arithmetic
    severity: High
    bug_class: wrapping-counter
    engine_function: ""
    target_file: programs/payment_stream/src/lib.rs
    claim: >
      Security-critical accumulators (claimed_amount, total_deposits,
      slash_pool) must use checked_add and abort on overflow, not
      wrapping_add. payment_stream::claim updates
      `payment_stream.claimed = transfer_amount.wrapping_add(payment_stream.claimed)`,
      vault_market::record_deposit wraps `total_deposits`, and
      stake_router::route_stake wraps `slash_pool` / `total_routed`. Once
      any of these saturates and wraps, downstream `remaining()` /
      daily-limit / fee-pool checks return a fresh budget, enabling
      double-claim and limit bypass. wrapping is silent — no event, no
      audit signal.
    relevant_instructions: |
      payment_stream::claim, vault_market::record_deposit,
      stake_router::route_stake

  - id: SOL47-policy-denied-uses-hardcoded-haircut
    class: logic
    severity: High
    bug_class: policy-bypass
    engine_function: ""
    target_file: programs/payment_stream/src/lib.rs
    claim: >
      When the engine's risk-policy assess returns
      `PolicyDecision::deny(...)`, the caller MUST apply
      `decision.net_amount(amount)` (which encodes fee + haircut). Several
      handlers instead substitute a hardcoded fraction:
      payment_stream::claim uses `available_amount / 2`, and
      nft_escrow::place_bid uses `amount.saturating_sub(apply_bps(amount, 250))`.
      The policy's stated penalty is silently bypassed — denial behavior
      diverges from the policy contract and a denied bid may still be
      stored as `highest_bid`.
    relevant_instructions: |
      payment_stream::claim, nft_escrow::place_bid

  - id: SOL48-risk-checkpoint-arg-type-mismatch
    class: logic
    severity: Medium
    bug_class: type-confusion
    engine_function: ""
    target_file: programs/bridge_mailbox/src/lib.rs
    claim: >
      `RiskCheckpoint::capture(observed, limit, slot, prior_slot)` requires
      `slot` arguments to be Solana slot numbers (monotonic with time).
      Callers must NOT pass a domain-level nonce or a confidence value as
      `prior_slot` — those are not slot-monotonic, so the staleness flag
      derived from `slot - prior_slot` becomes meaningless.
      bridge_mailbox::deliver passes `peer.last_nonce` as the fourth arg,
      and oracle_board::submit_price passes `confidence` as `observed` and
      `price.max(1)` as `limit`. Both checkpoints fire incorrectly or never.
    relevant_instructions: |
      bridge_mailbox::deliver, oracle_board::submit_price

  - id: SOL49-vote-weight-decay-inverted
    class: logic
    severity: Critical
    bug_class: decay-inversion
    engine_function: ""
    target_file: programs/dao_treasury/src/lib.rs
    claim: >
      Time-decayed vote weight MUST monotonically decrease with elapsed
      time since proposal start; the decay function MUST return
      `min(decayed, original)`. dao_treasury::vote applies
      `counted_weight = reduced_weight.max(weight)`, which means voting
      LATER (decayed value > original) actually INCREASES counted weight.
      Inverts the entire incentive of time-decayed voting — late voters
      win.
    relevant_instructions: |
      dao_treasury::vote

  - id: SOL50-proposal-execute-race-non-atomic
    class: state-machine
    severity: High
    bug_class: execute-race
    engine_function: ""
    target_file: programs/dao_treasury/src/lib.rs
    claim: >
      Governance execute MUST set `proposal.executed = true` and check
      `!executed` in a single atomic step. dao_treasury::execute reads
      yes_votes, checks quorum, then writes executed=true — the gap
      between read and write allows two concurrent executes (different
      transactions) that both observe `executed == false`. Without
      a single-instruction CAS, treasury funds disburse twice.
    relevant_instructions: |
      dao_treasury::execute

  - id: SOL51-lazy-state-init-during-mutation
    class: state-machine
    severity: Critical
    bug_class: lazy-init-race
    engine_function: ""
    target_file: programs/lending_pool/src/lib.rs
    claim: >
      Account state fields MUST be set during the dedicated initializer
      instruction, not lazily on first mutating call. lending_pool::borrow
      checks `if obligation.collateral_value == 0` and sets
      `collateral_value = price.saturating_mul(100)` on the fly, where
      `price` is the caller-supplied parameter. Whoever borrows first
      gets to define the collateral valuation by passing whatever price
      they want.
    relevant_instructions: |
      lending_pool::borrow

  - id: SOL52-hardcoded-mark-price-constant
    class: oracle
    severity: Critical
    bug_class: hardcoded-price
    engine_function: ""
    target_file: programs/margin_house/src/lib.rs
    claim: >
      Equity / PnL / liquidation math MUST use a live oracle price or a
      protocol-managed mark price. margin_house hardcodes
      `mark_price = 1i64` in liquidate and `equity(1)` in trade — every
      position's equity is computed against a constant 1, ignoring real
      token prices entirely. Distinct from SOL27 (oracle-zero-price) and
      SOL37 (oracle-bypass-user-supplied-price): no oracle account is
      referenced at all.
    relevant_instructions: |
      margin_house::trade, margin_house::liquidate

  - id: SOL53-liquidation-penalty-uncapped
    class: logic
    severity: High
    bug_class: penalty-uncapped
    engine_function: ""
    target_file: programs/margin_house/src/lib.rs
    claim: >
      Liquidation penalty MUST be bounded by a fraction of position size
      and capped by underwater amount. margin_house::liquidate accepts an
      arbitrary `penalty: u64` instruction parameter and deducts it from
      collateral with no proportionality check, no maximum, and no tie to
      the actual loss being socialized into the insurance fund.
    relevant_instructions: |
      margin_house::liquidate

  - id: SOL54-emergency-pause-delegate-bypass
    class: state-machine
    severity: Critical
    bug_class: pause-bypass
    engine_function: ""
    target_file: programs/vault_market/src/lib.rs
    claim: >
      Emergency-pause flag MUST gate every state-mutating user-facing
      instruction uniformly. vault_market::withdraw allows the gate to be
      bypassed when the requester is `user_vault.delegate`
      (`if (!market.paused) || (user_vault.delegate == requester.key())`).
      A compromised market with `paused = true` still drains via the
      delegate role.
    relevant_instructions: |
      vault_market::withdraw

  - id: SOL55-shares-assets-conflation-no-exchange-rate
    class: token-economics
    severity: High
    bug_class: share-rate-missing
    engine_function: ""
    target_file: programs/vault_market/src/lib.rs
    claim: >
      Vault MUST maintain a share-to-asset exchange rate so accrued fees
      and pool balance changes propagate to share value. vault_market
      mints shares 1:1 with deposit amount in `credit()` / `debit()` and
      never tracks an exchange rate. Distinct from SOL22
      (share-inflation-first-depositor): the issue here is structural —
      shares have no asset backing at all, fees never accrue to share
      value.
    relevant_instructions: |
      vault_market UserVault::credit / debit

  - id: SOL56-epoch-boundary-daily-limit-bypass
    class: logic
    severity: Medium
    bug_class: daily-cap-bypass
    engine_function: ""
    target_file: programs/vault_market/src/lib.rs
    claim: >
      Daily-volume caps MUST use a rolling 24h window (or per-day with a
      per-period cap reset that resists boundary games). vault_market
      resets `daily_used` whenever `last_epoch / 86_400 != now / 86_400`,
      so an attacker times two deposits at minute 23:59 + 00:01 to spend
      2× the daily cap inside a 2-minute window. The cap is meaningless
      against an attacker that watches the clock.
    relevant_instructions: |
      vault_market Market::record_deposit

  - id: SOL57-reward-accrual-skipped-on-zero-stake
    class: token-economics
    severity: High
    bug_class: zero-stake-accrual-loss
    engine_function: ""
    target_file: programs/rewards_farm/src/lib.rs
    claim: >
      `acc_reward_per_share` MUST advance every block regardless of
      `total_staked`; rewards accruing during a zero-stake period must be
      either stranded (skipped permanently) or queued for the next staker.
      rewards_farm::update returns early when `total_staked == 0` without
      advancing the per-share counter — the first staker to enter after a
      zero-stake gap inherits the gap's accrued rewards as if they'd been
      staked the whole time.
    relevant_instructions: |
      rewards_farm Farm::update

  - id: SOL58-reward-debt-allows-over-claim-on-restake
    class: token-economics
    severity: High
    bug_class: restake-over-claim
    engine_function: ""
    target_file: programs/rewards_farm/src/lib.rs
    claim: >
      When a user adds to an existing stake, the protocol MUST first
      crystalize their currently-earned rewards (pending = stake *
      acc_per_share - debt) and only then recompute reward_debt against
      the new amount. rewards_farm::stake recomputes
      `reward_debt = acc_per_share * new_amount / 1e9` immediately after
      the stake increment, with no harvest in between — the user can then
      harvest a full pending-reward window for the new amount as if it
      had been staked the whole time.
    relevant_instructions: |
      rewards_farm::stake

  - id: SOL59-harvest-emits-event-no-actual-transfer
    class: logic
    severity: Critical
    bug_class: harvest-no-transfer
    engine_function: ""
    target_file: programs/rewards_farm/src/lib.rs
    claim: >
      Harvest MUST issue a CPI transfer to the user's reward token
      account before emitting a HarvestExecuted event and advancing
      `farmer.harvested`. rewards_farm::harvest computes a
      `released_amount`, updates accounting, and emits the event — but
      never invokes `token::transfer`. The protocol records that rewards
      were paid out, but the tokens stay in the reward vault.
    relevant_instructions: |
      rewards_farm::harvest

  - id: SOL60-receipt-not-bound-to-parent-sale
    class: account-validation
    severity: Critical
    bug_class: receipt-unbound
    engine_function: ""
    target_file: programs/nft_escrow/src/lib.rs
    claim: >
      A bid receipt MUST be PDA-derived from its parent sale
      (`seeds = [b"bid", sale.key().as_ref(), bidder.key().as_ref()]`)
      and re-validated at settle. nft_escrow::settle_sale accepts a
      `BidReceipt` account with no `has_one`, no PDA seed constraint, and
      no check that `receipt.sale == sale.key()`. Any BidReceipt account
      can be paired with any Sale to drive settlement to an arbitrary
      bidder.
    relevant_instructions: |
      nft_escrow::settle_sale, SettleSale accounts struct

  - id: SOL61-settle-buyer-inversion
    class: logic
    severity: Critical
    bug_class: buyer-inversion
    engine_function: ""
    target_file: programs/nft_escrow/src/lib.rs
    claim: >
      Sale settlement MUST resolve the buyer as the highest-bid bidder
      iff the bid meets the price floor; the caller is NEVER the buyer.
      nft_escrow::settle_sale uses
      `let buyer = if sale.price > receipt.amount { caller.key() } else { receipt.bidder };`
      — when the highest bid is BELOW the price floor (the case where the
      sale should NOT settle), the caller becomes the buyer and walks
      away with the NFT.
    relevant_instructions: |
      nft_escrow::settle_sale

  - id: SOL62-weighted-average-stale-anchor
    class: oracle
    severity: High
    bug_class: oracle-stale-anchor
    engine_function: ""
    target_file: programs/oracle_board/src/lib.rs
    claim: >
      Aggregator weighting that biases the previous price (e.g. 3:1
      previous:new) MUST anchor against a max-age cutoff or decay the
      bias over time. oracle_board::submit_price applies a 3:1 prev:new
      weight whenever spread > 20% with NO ceiling on the prior-price
      age. A reporter submitting the same stale price repeatedly keeps
      the weighted average anchored to that value indefinitely; real
      market moves never converge.
    relevant_instructions: |
      oracle_board::submit_price

  - id: SOL63-halt-flag-bypassed-by-admin-rotate
    class: state-machine
    severity: High
    bug_class: halt-bypass
    engine_function: ""
    target_file: programs/oracle_board/src/lib.rs
    claim: >
      A halted feed MUST reject reporter rotation (or rotation MUST
      preserve the halted flag). oracle_board::rotate_reporter resets
      `feed.submissions = 0` and assigns a new reporter without checking
      `!feed.halted` — and without clearing the halt flag explicitly. A
      halted feed becomes effectively live again as soon as a new
      reporter starts submitting, because the submission count gates the
      halt-check downstream.
    relevant_instructions: |
      oracle_board::rotate_reporter

  - id: SOL64-signer-unscoped-on-state-mutation
    class: authorization
    severity: High
    bug_class: signer-unscoped
    engine_function: ""
    target_file: programs/payment_stream/src/lib.rs
    claim: >
      State-mutating instructions that take `Signer<'info>` MUST also
      bind the signer to the target account via has_one, seeds, or an
      equality constraint. Several handlers accept a free Signer with no
      scoping: payment_stream::cancel accepts any `authority: Signer`
      with no check it's the payer or recipient (any signer cancels any
      stream); rewards_farm::emergency_unlock accepts `authority: Signer`
      with no admin check (any signer triggers emergency for any farm).
      Distinct from SOL7 (permissionless-privileged-fn): the signer
      check IS present — the bug is that the signer is unconstrained,
      not absent.
    relevant_instructions: |
      payment_stream::cancel, rewards_farm::emergency_unlock


