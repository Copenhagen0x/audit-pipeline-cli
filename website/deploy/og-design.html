<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Jelleo · OG Image · 1200x630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
/* Render at 1300x800, body fills 1300x800. Content is positioned in top-left 1200x630.
   PIL crops the screenshot to exact 1200x630, with body backdrop filling everywhere. */
html, body {
  width: 1300px;
  height: 800px;
  overflow: hidden;
  background-color: #050504;
  background-image:
    radial-gradient(circle at 72% 24%, rgba(245,184,0,0.18), transparent 55%),
    radial-gradient(circle at 20% 60%, rgba(245,184,0,0.05), transparent 60%);
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  color: #f5f3ed;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

.bg-dots {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(245,243,237,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0.5;
  pointer-events: none;
}

.bracket {
  position: absolute;
  width: 70px; height: 70px;
  z-index: 100;
}
/* All positions are TOP-based, locked to canvas pixels (body is 1300x800, we crop top 1200x630) */
.bracket.tl { top: 28px; left: 28px; border-top: 3px solid #f5b800; border-left: 3px solid #f5b800; }
.bracket.br { top: 532px; left: 1102px; border-bottom: 3px solid #f5b800; border-right: 3px solid #f5b800; }

.bottom-strip {
  position: absolute;
  left: 0;
  top: 540px;
  width: 1200px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  z-index: 90;
  padding: 0 130px;
}
.pillar {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #f5f3ed;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.pillar .pn {
  color: #f5b800;
  font-weight: 800;
  font-size: 16px;
}
.dot {
  color: rgba(245,184,0,0.5);
  font-size: 18px;
  font-weight: 700;
}

.left {
  position: absolute;
  top: 0;
  left: 110px;
  width: 540px;
  height: 540px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  z-index: 50;
}

.wordmark {
  font-size: 130px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.25;
  color: #f5f3ed;
  position: relative;
  display: inline-block;
  /* CRITICAL: align-self prevents flex parent from stretching wordmark to 540px,
     keeping it sized to text content so the TR bracket sits next to "o", not far right. */
  align-self: flex-start;
  width: fit-content;
  /* Asymmetric padding: more on left (j descender needs room from BL bracket),
     small on right + top so TR bracket sits just outside the "o" letter */
  padding: 10px 8px 12px 32px;
  margin-bottom: 28px;
}
.wordmark::before, .wordmark::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
}
.wordmark::before { top: 14px; right: 0; border-top: 3px solid #f5b800; border-right: 3px solid #f5b800; }
.wordmark::after  { bottom: 0; left: 0; border-bottom: 3px solid #f5b800; border-left: 3px solid #f5b800; }

.tagline {
  font-size: 38px;
  font-weight: 500;
  line-height: 1.25;
  color: rgba(245,243,237,0.92);
  letter-spacing: -0.018em;
}
.tagline .accent {
  background: linear-gradient(135deg, #f5b800 0%, #ffce4a 60%, #ff8c42 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

.right {
  position: absolute;
  top: 30px;
  left: 670px;
  width: 480px;
  height: 480px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
#sphere {
  width: 480px;
  height: 480px;
  display: block;
}
</style>
</head>
<body>

<div class="bg-dots"></div>
<span class="bracket tl"></span>
<span class="bracket br"></span>

<div class="left">
  <div class="wordmark">jelleo</div>
  <div class="tagline">
    The underwriting layer<br>for <span class="accent">Solana DeFi</span>.
  </div>
</div>

<div class="right">
  <svg id="sphere" viewBox="-1.3 -1.3 2.6 2.6" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(245,184,0,0.30)"/>
        <stop offset="35%" stop-color="rgba(245,184,0,0.12)"/>
        <stop offset="75%" stop-color="rgba(245,184,0,0.02)"/>
        <stop offset="100%" stop-color="rgba(245,184,0,0)"/>
      </radialGradient>
    </defs>
    <circle cx="0" cy="0" r="1.28" fill="url(#glow)"/>
    <g id="lines"></g>
    <g id="nodes"></g>
  </svg>
</div>

<div class="bottom-strip">
  <span class="pillar"><span class="pn">P1</span> Detection</span>
  <span class="dot">·</span>
  <span class="pillar"><span class="pn">P2</span> Propagation</span>
  <span class="dot">·</span>
  <span class="pillar"><span class="pn">P3</span> Fix bundles</span>
  <span class="dot">·</span>
  <span class="pillar"><span class="pn">P4</span> Attestation</span>
</div>

<script>
const phi = (1 + Math.sqrt(5)) / 2;
const verts3d = [
  [0, 1, phi], [0, 1, -phi], [0, -1, phi], [0, -1, -phi],
  [1, phi, 0], [1, -phi, 0], [-1, phi, 0], [-1, -phi, 0],
  [phi, 0, 1], [phi, 0, -1], [-phi, 0, 1], [-phi, 0, -1]
];
const len = Math.sqrt(1 + phi*phi);
const verts = verts3d.map(([x, y, z]) => [x/len, y/len, z/len]);
function midpoint(a, b) {
  const m = [(a[0]+b[0])/2, (a[1]+b[1])/2, (a[2]+b[2])/2];
  const l = Math.sqrt(m[0]*m[0] + m[1]*m[1] + m[2]*m[2]);
  return [m[0]/l, m[1]/l, m[2]/l];
}
const baseEdges = [];
for (let i = 0; i < verts.length; i++) {
  for (let j = i+1; j < verts.length; j++) {
    const dx = verts[i][0]-verts[j][0], dy = verts[i][1]-verts[j][1], dz = verts[i][2]-verts[j][2];
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (d < 1.15) baseEdges.push([i, j]);
  }
}
const allVerts = [...verts];
for (const [i, j] of baseEdges) allVerts.push(midpoint(verts[i], verts[j]));
const allEdges = [];
for (let i = 0; i < allVerts.length; i++) {
  for (let j = i+1; j < allVerts.length; j++) {
    const dx = allVerts[i][0]-allVerts[j][0], dy = allVerts[i][1]-allVerts[j][1], dz = allVerts[i][2]-allVerts[j][2];
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (d < 0.65) allEdges.push([i, j]);
  }
}
function rotateY(p, a) { const [x,y,z]=p; return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)]; }
function rotateX(p, a) { const [x,y,z]=p; return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)]; }
const angY = 28 * Math.PI / 180;
const angX = -18 * Math.PI / 180;
const rotated = allVerts.map(v => rotateX(rotateY(v, angY), angX));

const linesG = document.getElementById('lines');
for (const [i, j] of allEdges) {
  const [x1, y1, z1] = rotated[i];
  const [x2, y2, z2] = rotated[j];
  const avgZ = (z1 + z2) / 2;
  const opacity = (0.20 + Math.max(0, avgZ) * 0.55).toFixed(3);
  const sw = 0.009 + Math.max(0, avgZ) * 0.005;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1.toFixed(4));
  line.setAttribute('y1', (-y1).toFixed(4));
  line.setAttribute('x2', x2.toFixed(4));
  line.setAttribute('y2', (-y2).toFixed(4));
  line.setAttribute('stroke', '#f5b800');
  line.setAttribute('stroke-width', sw.toFixed(4));
  line.setAttribute('opacity', opacity);
  line.setAttribute('stroke-linecap', 'round');
  linesG.appendChild(line);
}
const nodesG = document.getElementById('nodes');
for (let i = 0; i < rotated.length; i++) {
  const [x, y, z] = rotated[i];
  const isOriginal = i < 12;
  const opacity = (0.45 + Math.max(0, z) * 0.55).toFixed(3);
  const r = isOriginal
    ? (0.050 + Math.max(0, z) * 0.045).toFixed(4)
    : (0.022 + Math.max(0, z) * 0.020).toFixed(4);
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', x.toFixed(4));
  c.setAttribute('cy', (-y).toFixed(4));
  c.setAttribute('r', r);
  c.setAttribute('fill', '#f5f3ed');
  c.setAttribute('opacity', opacity);
  nodesG.appendChild(c);
}
</script>

</body>
</html>
