<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jelleo · Customer portal</title>
<meta name="description" content="Customer dashboards are now token-gated. Redirecting to the customer portal.">
<meta name="theme-color" content="#050504">
<meta http-equiv="refresh" content="0; url=/customer/">
<link rel="canonical" href="https://jelleo.com/customer/">
<meta name="robots" content="noindex,nofollow">
<style>
html, body { background: #050504; color: #f5f3ed; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; height: 100%; }
.box { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.card { max-width: 480px; text-align: center; }
.card .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; color: #f5b800; margin-bottom: 16px; }
.card h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
.card p { font-size: 14px; line-height: 1.6; color: rgba(245,243,237,0.72); margin: 0 0 24px; }
.card a { display: inline-block; padding: 12px 22px; background: #f5b800; color: #050504; text-decoration: none; font-weight: 600; border-radius: 6px; transition: background .2s ease; }
.card a:hover { background: #ffce4a; }
</style>
</head>
<body>
<div class="box">
  <div class="card">
    <div class="eyebrow">Token-gated</div>
    <h1>Dashboards are now per-customer.</h1>
    <p>Each protocol's dashboard is accessible only with its customer token. The universal demo token is <strong>demo</strong>. Redirecting to the portal…</p>
    <a href="/customer/">Open the customer portal →</a>
  </div>
</div>
<script>setTimeout(() => { location.href = '/customer/'; }, 800);</script>
</body>
</html>
