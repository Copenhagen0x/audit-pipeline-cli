hypotheses:

  - id: D1-u512-fast-path-divides-correctly
    class: differential_property
    severity: High
    claim: >
      The new U512::checked_div_rem_by_u256 fast path at wide_math.rs:1323-1327
      diverts to div_rem_u256 when the numerator upper 256 bits are zero.
      For every U512 numerator and U256 divisor where the fast-path condition
      fires, the (quotient, remainder) returned by the fast path agrees with
      the long-division loop at 1336-1352.
    target_file: src/wide_math.rs

  - id: D2-u512-fast-path-precondition-tight
    class: invariant_property
    severity: Medium
    claim: >
      The fast path at wide_math.rs:1323 fires when self.0[2]==0 AND
      self.0[3]==0 AND self >= den_512 (the less-than early-return at 1318
      already handles self < den_512). For any input where self fits in U256
      but the fast path produces wrong output, this is a violation. Verify
      div_rem_u256(self_lower_u256, den) yields the same result as the
      long-division branch.
    target_file: src/wide_math.rs

