server {
    server_name api.jelleo.com;
    root /var/www/jelleo.com;

    add_header Access-Control-Allow-Origin "https://jelleo.com" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    location = /snapshot.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "https://jelleo.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri =404;
    }

    location /keys/ {
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

location /customer/ {
        # Per-customer manifest.json behind the token gate. The customer-
        # portal page at jelleo.com/customer/<token>/ fetches this. Returns
        # 404 for unknown tokens (no directory listing).
        add_header Access-Control-Allow-Origin "https://jelleo.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        autoindex off;
        try_files $uri =404;
    }

    location /cycles/ {
        # Cycle reports: signed HTML + PDF + signature files. Public per the
        # privacy model — only published cycle artifacts land here, and the
        # findings DB stays out of the docroot. Same CORS as snapshot.
        add_header Access-Control-Allow-Origin "https://jelleo.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=300" always;
        autoindex off;
        index index.html;
        try_files $uri $uri/index.html =404;
    }

    if ($request_method = OPTIONS) { return 204; }

    # P4 Y0: signed proof-of-running heartbeat (jelleo-heartbeat.timer writes
    # /var/www/jelleo.com/heartbeat.json + .json.sig hourly).
    location = /heartbeat.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }
    location = /heartbeat.json.sig {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # P3 Y0: per-finding fix-bundle public archive (audit-pipeline bundle
    # publish-archive populates this; operator-private files are stripped at
    # publish time).
    location /bundles/ {
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
        autoindex off;
        try_files $uri $uri/ =404;
    }

    # P5 Y0: Server-Sent Events live stream from jelleo-sse.service.
    # Tails the active hunt cycle's hunt.log.jsonl and broadcasts each
    # JSON line to subscribers. Browser opens one long-lived
    # EventSource here. SSE through nginx requires HTTP/1.1, no
    # buffering, long timeouts, no cache.
    location /events/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
        # Location-level add_header REPLACES server-level (nginx merge rule),
        # so we must re-declare CORS here for the dashboard origin.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "https://jelleo.com" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    location / { return 403; }

    access_log /var/log/nginx/api.jelleo.com.access.log;
    error_log  /var/log/nginx/api.jelleo.com.error.log;

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.jelleo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.jelleo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api.jelleo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.jelleo.com;
    return 404; # managed by Certbot


}