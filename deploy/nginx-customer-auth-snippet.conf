# nginx snippet — wire jelleo-token-auth.service into the /customer/ block.
#
# Drop into /etc/nginx/sites-available/api.jelleo.com.conf (or your
# equivalent) inside the `server { ... }` block. After editing:
#
#   nginx -t && systemctl reload nginx
#
# IMPORTANT: the sidecar service (jelleo-token-auth.service) must be
# running BEFORE you enable auth_request — otherwise every request to
# /customer/<id>/manifest.json returns 502 until the sidecar starts.
#
# To roll back: comment out the `auth_request` line in the /customer/
# block. The auth_request location stays harmless (no traffic hits it).

# --- Inside the /customer/ location block, add this line: ---
#
#     location /customer/ {
#         auth_request /_jelleo_token_auth;        # <— add this
#         auth_request_set $auth_status $upstream_status;
#         error_page 401 403 = @manifest_denied;
#
#         add_header Access-Control-Allow-Origin "https://jelleo.com" always;
#         add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
#         add_header Cache-Control "no-store, no-cache, must-revalidate" always;
#         autoindex off;
#         try_files $uri =404;
#     }

# --- Inside the server { ... } block, ALSO add these two locations: ---

location = /_jelleo_token_auth {
    # Internal subrequest: extract the customer id from the original
    # request URI, then proxy to the loopback sidecar with cid + token.
    internal;
    # Customer URI looks like /customer/<cid>/manifest.json?t=<token>.
    # Extract cid into $auth_cid via a regex on the original URI.
    if ($request_uri ~ "^/customer/([^/?]+)") {
        set $auth_cid $1;
    }
    # Token comes from the original query string ?t=<token>.
    set $auth_t $arg_t;
    proxy_pass http://127.0.0.1:8766/verify?cid=$auth_cid&t=$auth_t;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
}

location @manifest_denied {
    # Friendly 403 body for an invalid/expired token. Keeps the
    # original CORS headers so the customer dashboard's fetch surfaces
    # a clear error rather than CORS-blocking.
    add_header Access-Control-Allow-Origin "https://jelleo.com" always;
    add_header Content-Type "application/json" always;
    return 403 '{"error":"invalid_or_expired_token","docs":"https://jelleo.com/customer/"}';
}
